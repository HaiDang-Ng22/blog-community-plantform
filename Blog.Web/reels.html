<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="assets/favicon.png?v=2" type="image/png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zynk Reels</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/common.css?v=2.2">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            overflow: hidden;
            background: #09090b;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            position: relative;
        }

        /* --- 3D Background Floating Lights --- */
        body::before, body::after {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            filter: blur(140px);
            z-index: 0;
            opacity: 0.15;
            pointer-events: none;
        }
        body::before {
            background: #6366f1;
            top: 20%;
            left: 10%;
            animation: floatLight1 18s infinite alternate ease-in-out;
        }
        body::after {
            background: #ec4899;
            bottom: 20%;
            right: 10%;
            animation: floatLight2 24s infinite alternate ease-in-out;
        }
        @keyframes floatLight1 {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(60px, -40px) scale(1.2); }
        }
        @keyframes floatLight2 {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(-80px, 50px) scale(0.85); }
        }

        .reels-wrapper {
            display: flex;
            height: 100vh;
            position: relative;
            z-index: 1;
        }
        .reels-container {
            flex: 1;
            height: 100vh;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scrollbar-width: none;
            position: relative;
            background: #000;
        }
        .reels-container::-webkit-scrollbar { display: none; }
        
        .reel-item {
            height: 100vh;
            width: 100%;
            scroll-snap-align: start;
            position: relative;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        
        .reel-video {
            height: 100%;
            width: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }
        
        /* Dynamic Video Progress Bar */
        .reel-progress-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 4px;
            background: linear-gradient(90deg, #6366f1, #a855f7, #ec4899);
            width: 0%;
            z-index: 15;
            transition: width 0.1s linear;
        }

        .reel-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 50px 24px 24px;
            background: linear-gradient(transparent, rgba(0, 0, 0, 0.4) 30%, rgba(0, 0, 0, 0.85) 100%);
            color: white;
            z-index: 10;
            box-sizing: border-box;
        }
        
        .reel-actions {
            position: absolute;
            right: 20px;
            bottom: 90px;
            display: flex;
            flex-direction: column;
            gap: 22px;
            align-items: center;
            z-index: 20;
        }
        
        /* Glassmorphic 3D Action Buttons */
        .reel-action-btn {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            width: 52px;
            height: 52px;
            border-radius: 50%;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            position: relative;
        }
        
        .reel-action-btn i { 
            font-size: 1.35rem;
            transition: transform 0.2s ease;
        }
        .reel-action-btn span { 
            position: absolute;
            bottom: -18px;
            font-size: 0.72rem; 
            font-weight: 600; 
            color: #e2e8f0;
            text-shadow: 0 2px 4px rgba(0,0,0,0.6);
        }
        
        .reel-action-btn:hover {
            transform: scale(1.12) translateY(-2px);
            background: rgba(255, 255, 255, 0.16);
            border-color: rgba(255, 255, 255, 0.25);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.35);
        }
        .reel-action-btn:hover i {
            transform: scale(1.08);
        }
        .reel-action-btn.liked {
            background: rgba(239, 68, 68, 0.15);
            border-color: rgba(239, 68, 68, 0.3);
        }
        .reel-action-btn.liked i { 
            color: #ef4444; 
            filter: drop-shadow(0 0 6px rgba(239, 68, 68, 0.6));
        }
        .reel-action-btn.saved i {
            color: #eab308;
            filter: drop-shadow(0 0 6px rgba(234, 179, 8, 0.6));
        }
        
        .reel-user {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }
        .reel-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.85);
            object-fit: cover;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .reel-username { 
            font-weight: 700; 
            font-size: 1.02rem;
            text-shadow: 0 1px 3px rgba(0,0,0,0.5);
        }
        .reel-follow-btn {
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(8px);
            color: white;
            padding: 5px 14px;
            border-radius: 20px;
            font-size: 0.82rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .reel-follow-btn:hover {
            background: white;
            color: black;
            transform: scale(1.05);
        }
        
        .reel-caption {
            font-size: 0.92rem;
            line-height: 1.5;
            max-width: 82%;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            color: #f1f5f9;
            text-shadow: 0 1px 3px rgba(0,0,0,0.5);
        }

        .reels-nav {
            width: 76px;
            background: #09090b;
            border-right: 1px solid rgba(255,255,255,0.06);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 0;
            gap: 28px;
        }
        
        .reels-nav a {
            color: #a1a1aa;
            font-size: 1.4rem;
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            text-decoration: none;
        }
        .reels-nav a:hover, .reels-nav a.active { 
            color: white; 
            background: rgba(255, 255, 255, 0.08);
            transform: scale(1.08);
        }

        @media (max-width: 767px) {
            .reels-nav { display: none; }
        }

        @media (min-width: 768px) {
            .reels-container {
                max-width: 450px;
                height: 94vh;
                margin: 3vh auto;
                border-radius: 20px;
                box-shadow: 0 25px 60px rgba(0,0,0,0.8);
                border: 1px solid rgba(255,255,255,0.08);
            }
            .reel-item {
                height: 94vh;
                border-radius: 20px;
            }
        }

        /* --- Reels Comment Drawer Glassmorphism --- */
        .reel-comments-drawer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 60vh;
            background: rgba(18, 18, 24, 0.85);
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            border-top-left-radius: 24px;
            border-top-right-radius: 24px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            color: white;
            box-shadow: 0 -15px 40px rgba(0,0,0,0.6);
            border-top: 1px solid rgba(255,255,255,0.08);
        }
        .reel-comments-drawer.open {
            transform: translateY(0);
        }
        @media (min-width: 768px) {
            .reel-comments-drawer {
                position: fixed;
                width: 390px;
                height: 94vh;
                left: auto;
                right: 20px;
                top: 3vh;
                bottom: 3vh;
                border-radius: 20px;
                transform: translateX(120%);
                border: 1px solid rgba(255,255,255,0.08);
                box-shadow: -10px 0 40px rgba(0,0,0,0.4);
            }
            .reel-comments-drawer.open {
                transform: translateX(0);
            }
        }
        .reel-comments-header {
            padding: 18px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 700;
            font-size: 1.05rem;
            letter-spacing: -0.3px;
        }
        .reel-comments-close {
            background: rgba(255,255,255,0.06);
            border: none;
            color: #a1a1aa;
            font-size: 1.25rem;
            cursor: pointer;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .reel-comments-close:hover {
            background: rgba(255,255,255,0.15);
            color: white;
        }
        .reel-comments-list {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }
        .reel-comments-list::-webkit-scrollbar { width: 4px; }
        .reel-comments-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

        .reel-comments-input-area {
            padding: 16px 20px;
            border-top: 1px solid rgba(255,255,255,0.06);
            background: rgba(9, 9, 11, 0.85);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .reel-comments-input-area input {
            flex: 1;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 24px;
            padding: 10px 18px;
            color: white;
            font-size: 0.9rem;
            outline: none;
            transition: all 0.3s;
        }
        .reel-comments-input-area input:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(99, 102, 241, 0.4);
        }
        .reel-comments-input-area button {
            background: none;
            border: none;
            color: #6366f1;
            font-weight: 700;
            cursor: pointer;
            font-size: 0.92rem;
            transition: color 0.2s;
        }
        .reel-comments-input-area button:hover {
            color: #818cf8;
        }
        
        /* Mini styling inside Reels Comments */
        .reel-comments-list .comment-item {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            font-size: 0.88rem;
            animation: commentPop 0.3s ease-out;
        }
        @keyframes commentPop {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .reel-comments-list .mini-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .reel-comments-list .comment-content-box {
            flex: 1;
        }
        .reel-comments-list .comment-author {
            font-weight: 700;
            color: white;
            text-decoration: none;
            margin-right: 8px;
            transition: color 0.2s;
        }
        .reel-comments-list .comment-author:hover {
            color: #818cf8;
        }
        .reel-comments-list .comment-text {
            color: #e4e4e7;
            line-height: 1.5;
        }
        .reel-comments-list .comment-actions {
            font-size: 0.78rem;
            color: #71717a;
            margin-top: 6px;
            display: flex;
            gap: 12px;
        }
        .reel-comments-list .action-link {
            background: none;
            border: none;
            color: #71717a;
            cursor: pointer;
            padding: 0;
            font-weight: 600;
            transition: color 0.2s;
        }
        .reel-comments-list .action-link:hover {
            color: white;
        }
        .reel-comments-list .action-link.delete {
            color: #f43f5e;
        }
        .reel-comments-list .action-link.delete:hover {
            color: #fda4af;
        }
    </style>
</head>
<body class="dark-mode">
    <!-- Global Mute Toggle Button -->
    <button id="global-mute-btn" onclick="toggleGlobalMute()" title="Bật/Tắt âm thanh" style="
        position: fixed;
        top: 18px;
        right: 20px;
        z-index: 2000;
        background: rgba(255,255,255,0.1);
        border: 1px solid rgba(255,255,255,0.15);
        backdrop-filter: blur(12px);
        color: white;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        font-size: 1rem;
        transition: all 0.3s;
        box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    ">
        <i class="fa-solid fa-volume-xmark"></i>
    </button>

    <div class="reels-wrapper">
        <aside class="reels-nav">
            <a href="index.html" title="Trang chủ"><i class="fa-solid fa-house"></i></a>
            <a href="reels.html" class="active" title="Reels"><i class="fa-solid fa-clapperboard"></i></a>
            <a href="notifications.html" title="Thông báo"><i class="fa-solid fa-bell"></i></a>
            <a href="create-post.html" title="Tạo Reel"><i class="fa-solid fa-circle-plus"></i></a>
            <a href="profile.html" title="Trang cá nhân"><i class="fa-solid fa-user"></i></a>
        </aside>

        <main id="reels-feed" class="reels-container">
            <!-- Reels will be injected here -->
            <div class="loader-container" style="height: 100vh; display: flex; align-items: center; justify-content: center;">
                <i class="fa-solid fa-spinner fa-spin fa-2xl" style="color: white;"></i>
            </div>
        </main>
    </div>

    <!-- Comment Drawer -->
    <div id="reel-comments-drawer" class="reel-comments-drawer">
        <div class="reel-comments-header">
            <span>Bình luận</span>
            <button class="reel-comments-close" onclick="closeReelComments()">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>
        <div id="reel-comments-list" class="reel-comments-list">
            <!-- Comments will be loaded here -->
        </div>
        <div class="reel-comments-input-area">
            <input type="text" id="reel-comment-input" placeholder="Thêm bình luận...">
            <button id="reel-comment-submit">Đăng</button>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/common.js"></script>
    <script src="js/post-actions.js"></script>
    <script src="js/reels.js"></script>
    <script>
        let isMuted = true;
        function toggleGlobalMute() {
            isMuted = !isMuted;
            const btn = document.getElementById('global-mute-btn');
            btn.innerHTML = isMuted
                ? '<i class="fa-solid fa-volume-xmark"></i>'
                : '<i class="fa-solid fa-volume-high"></i>';
            document.querySelectorAll('.reel-video').forEach(v => v.muted = isMuted);
        }
        // All videos start muted (browser autoplay policy)
        document.addEventListener('DOMContentLoaded', () => {
            document.querySelectorAll('.reel-video').forEach(v => v.muted = true);
        });
    </script>
</body>
</html>
