<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Đơn hàng - Zynk Shop</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="seller-common.css">
    <style>
        .order-tabs-wrapper {
            margin-bottom: 1.5rem;
            border-bottom: 1px solid var(--seller-border);
        }
        .order-status-tabs {
            display: flex;
            gap: 1.5rem;
            overflow-x: auto;
            scrollbar-width: none;
        }
        .order-status-tabs::-webkit-scrollbar {
            display: none;
        }
        .order-tab {
            padding: 0.85rem 0.5rem;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--seller-text-light);
            cursor: pointer;
            border-bottom: 3px solid transparent;
            white-space: nowrap;
            transition: 0.2s;
        }
        .order-tab:hover {
            color: var(--seller-text);
        }
        .order-tab.active {
            color: var(--seller-primary);
            border-bottom-color: var(--seller-primary);
        }
        .order-search-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 1.5rem;
        }
        .search-input-group {
            flex: 1;
            position: relative;
        }
        .search-input-group i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--seller-text-light);
        }
        .search-input-group input {
            width: 100%;
            padding: 0.65rem 0.85rem 0.65rem 2.5rem;
            border: 1px solid var(--seller-border);
            border-radius: 8px;
            font-size: 0.9rem;
            outline: none;
            transition: 0.2s;
        }
        .search-input-group input:focus {
            border-color: var(--seller-primary);
        }
        .order-premium-card {
            background: white;
            border-radius: 12px;
            padding: 1.25rem 1.5rem;
            margin-bottom: 1rem;
            border: 1px solid var(--seller-border);
            box-shadow: var(--shadow-sm);
            display: grid;
            grid-template-columns: 1fr 1.5fr min-content;
            gap: 1.5rem;
            align-items: center;
            transition: 0.2s;
        }
        .order-premium-card:hover {
            box-shadow: var(--shadow-md);
            border-color: #cbd5e1;
        }
        .order-id {
            font-size: 0.8rem;
            font-weight: 800;
            color: var(--seller-text-light);
            background: #f1f5f9;
            padding: 2px 6px;
            border-radius: 4px;
            display: inline-block;
            margin-bottom: 4px;
        }
        .status-badge {
            display: inline-flex;
            align-items: center;
            padding: 3px 8px;
            border-radius: 6px;
            font-size: 0.72rem;
            font-weight: 700;
            text-transform: uppercase;
        }
        .status-badge.unpaid { background-color: #fef3c7; color: #d97706; }
        .status-badge.awaitingshipment { background-color: #e0f2fe; color: #0284c7; }
        .status-badge.intransit { background-color: #e0e7ff; color: #4f46e5; }
        .status-badge.delivered { background-color: #ecfdf5; color: #059669; }
        .status-badge.completed { background-color: #d1fae5; color: #065f46; }
        .status-badge.cancelled { background-color: #fee2e2; color: #dc2626; }
        
        .order-items-box {
            border-left: 1px solid #e2e8f0;
            padding-left: 1.25rem;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .order-item-row {
            font-size: 0.88rem;
            color: #334155;
            display: flex;
            justify-content: space-between;
        }
        .order-item-row strong {
            color: #0f172a;
        }
        
        .order-price {
            font-size: 1.15rem;
            font-weight: 800;
            color: #2563eb;
            margin-bottom: 8px;
        }
        .order-actions {
            display: flex;
            flex-direction: column;
            gap: 6px;
            width: 100px;
        }
        .order-actions button {
            padding: 0.45rem 0.65rem;
            font-size: 0.8rem;
            font-weight: 700;
            border-radius: 6px;
            border: 1px solid transparent;
            cursor: pointer;
            transition: 0.2s;
        }
        .order-actions button.confirm {
            background-color: var(--seller-primary);
            color: white;
        }
        .order-actions button.confirm:hover {
            background-color: var(--seller-primary-hover);
        }
        .order-actions button.detail {
            background-color: white;
            border-color: var(--seller-border);
            color: #475569;
        }
        .order-actions button.detail:hover {
            background-color: #f8fafc;
            border-color: #cbd5e1;
        }
    </style>
</head>
<body>
    <main class="seller-main">
        <header class="seller-header">
            <div class="seller-title">
                <h1>Quản lý Đơn hàng</h1>
                <p>Theo dõi tiến độ, xác nhận chuẩn bị hàng và cập nhật hành trình giao đơn đến người mua.</p>
            </div>
        </header>

        <!-- Order Tabs -->
        <div class="order-tabs-wrapper">
            <nav class="order-status-tabs" id="order-status-tabs">
                <div class="order-tab active" data-status="All">Tất cả</div>
                <div class="order-tab" data-status="Unpaid">Chờ xác nhận</div>
                <div class="order-tab" data-status="AwaitingShipment">Chờ giao hàng</div>
                <div class="order-tab" data-status="InTransit">Đang giao</div>
                <div class="order-tab" data-status="Delivered">Đã giao</div>
                <div class="order-tab" data-status="Completed">Hoàn thành</div>
                <div class="order-tab" data-status="Cancelled">Đã hủy</div>
            </nav>
        </div>

        <!-- Search Bar -->
        <div class="order-search-bar">
            <div class="search-input-group">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="order-search-input" placeholder="Tìm kiếm theo mã đơn, họ tên người mua hoặc số điện thoại...">
            </div>
            <button class="btn btn-primary" onclick="applyFilters()" style="width: auto;">
                Tìm kiếm
            </button>
        </div>

        <!-- Order List Box -->
        <div id="order-list-container">
            <div style="text-align: center; padding: 4rem;">
                <i class="fa-solid fa-spinner fa-spin fa-2x" style="color: var(--seller-primary);"></i>
                <p style="margin-top: 1rem; color: var(--seller-text-light);">Đang tải danh sách đơn hàng...</p>
            </div>
        </div>
    </main>

    <script src="../js/api.js"></script>
    <script src="seller-common.js"></script>
    <script>
        let activeOrderTab = 'All';
        let orderSearchKeyword = '';

        async function initPage() {
            initOrderTabListeners();
            await loadIncomingOrders();
        }

        async function loadIncomingOrders() {
            const container = document.getElementById('order-list-container');
            if (!container) return;

            try {
                const query = `status=${activeOrderTab}&keyword=${encodeURIComponent(orderSearchKeyword)}`;
                const orders = await window.api.get(`seller/incoming-orders?${query}`);

                if (orders.length === 0) {
                    container.innerHTML = `
                        <div class="card" style="text-align: center; padding: 4rem; color: var(--seller-text-light);">
                            <i class="fa-regular fa-clipboard fa-3x" style="margin-bottom: 1rem; color: #cbd5e1;"></i>
                            <p>Không tìm thấy đơn hàng nào phù hợp.</p>
                        </div>
                    `;
                    return;
                }

                container.innerHTML = orders.map(o => `
                    <div class="order-premium-card">
                        <div>
                            <span class="order-id">#${o.id.substring(0, 8).toUpperCase()}</span>
                            <div style="font-weight: 700; color: #0f172a; font-size: 1rem; margin: 4px 0;">${o.customerName}</div>
                            <div style="font-size: 0.85rem; color: var(--seller-text-light); margin-bottom: 8px;">
                                <i class="fa-solid fa-phone"></i> ${o.phoneNumber}
                            </div>
                            <div>
                                <span class="status-badge ${o.status.toLowerCase()}">${getStatusText(o.status)}</span>
                            </div>
                        </div>
                        
                        <div class="order-items-box">
                            ${o.items.map(i => `
                                <div class="order-item-row">
                                    <span>${i.productName} ${i.variantLabel ? `<span style="color:#6366f1;font-size:0.75rem;">(${i.variantLabel})</span>` : ''}</span>
                                    <strong>x${i.quantity}</strong>
                                </div>
                            `).join('')}
                        </div>
                        
                        <div style="text-align: right; display: flex; flex-direction: column; align-items: flex-end; justify-content: center;">
                            <div class="order-price">${formatCurrency(o.totalAmount)}</div>
                            <div class="order-actions">
                                ${getActionButtons(o.id, o.status)}
                            </div>
                        </div>
                    </div>
                `).join('');
            } catch (err) {
                console.error(err);
                container.innerHTML = `
                    <div class="card" style="text-align: center; padding: 2rem; color: #ef4444; border-color: #fee2e2;">
                        <i class="fa-solid fa-triangle-exclamation fa-2x"></i>
                        <p style="margin-top: 1rem;">Không thể kết nối tải thông tin đơn hàng.</p>
                    </div>
                `;
            }
        }

        function initOrderTabListeners() {
            const tabs = document.querySelectorAll('.order-tab');
            tabs.forEach(tab => {
                tab.onclick = async () => {
                    tabs.forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    activeOrderTab = tab.dataset.status;
                    await loadIncomingOrders();
                };
            });
        }

        function applyFilters() {
            orderSearchKeyword = document.getElementById('order-search-input').value.trim();
            loadIncomingOrders();
        }

        function getStatusText(s) {
            const map = { 
                'Unpaid': 'Chờ xác nhận', 
                'AwaitingShipment': 'Chờ giao hàng', 
                'InTransit': 'Đang vận chuyển', 
                'Delivered': 'Đã giao hàng', 
                'Completed': 'Hoàn thành', 
                'Cancelled': 'Đã hủy' 
            };
            return map[s] || s;
        }

        function getActionButtons(id, status) {
            const s = status.toLowerCase();
            let buttons = '';
            
            if (s === 'unpaid') {
                buttons += `<button class="confirm" onclick="updateOrderStatus('${id}', 'AwaitingShipment')">Xác nhận</button>`;
            } else if (s === 'awaitingshipment') {
                buttons += `<button class="confirm" onclick="updateOrderStatus('${id}', 'InTransit')" style="background-color: #3b82f6;">Giao hàng</button>`;
            } else if (s === 'intransit') {
                buttons += `<button class="confirm" onclick="updateOrderStatus('${id}', 'Delivered')" style="background-color: #8b5cf6;">Đã giao</button>`;
            }
            
            // Chi tiết đơn hàng
            buttons += `<button class="detail" onclick="window.location.href='../seller-order-detail.html?id=${id}'">Chi tiết</button>`;
            return buttons;
        }

        async function updateOrderStatus(id, status) {
            if (!confirm('Xác nhận cập nhật trạng thái đơn hàng này?')) return;
            try {
                await window.api.patch(`orders/${id}/status`, { status });
                alert('Đã cập nhật trạng thái đơn hàng!');
                await loadIncomingOrders();
            } catch (err) {
                alert(err.message || 'Lỗi khi cập nhật trạng thái.');
            }
        }
    </script>
</body>
</html>
