<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <link rel="icon" href="assets/favicon.png?v=2" type="image/png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="profile">Hồ sơ cá nhân - Zynk</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/common.css?v=1.5">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/home.css?v=1.7">
    <link rel="stylesheet" href="css/profile.css?v=2.1">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="home-page" data-i18n-title="profile">


    <main class="main-content" style="padding-top: 40px;">
        <div class="profile-container" style="max-width: 900px; margin: 0 auto;">
            <!-- Profile Header Modern -->
            <div class="profile-header-modern" id="profile-header-loading">
                <div class="ph-avatar-wrap">
                    <div class="ph-avatar-ring">
                        <img src="https://ui-avatars.com/api/?name=User&background=random" id="profile-avatar" alt="Avatar">
                    </div>
                </div>
                
                <div class="ph-info-wrap">
                    <div class="ph-top-row">
                        <h2 id="profile-username" class="ph-username">@loading</h2>
                        <div class="ph-actions">
                            <button id="follow-btn" class="btn primary-btn ph-btn" data-i18n="follow">Theo dõi</button>
                            <button id="message-btn" class="btn secondary-btn ph-btn hidden">
                                <i class="fa-regular fa-paper-plane"></i> Nhắn tin
                            </button>
                        </div>
                    </div>
                    
                    <div class="ph-stats-row">
                        <div class="ph-stat" onclick="switchTab('gallery')">
                            <b id="post-count">0</b> <span data-i18n="posts_label">bài viết</span>
                        </div>
                        <div class="ph-stat" onclick="openUserListModal('followers')">
                            <b id="follower-count">0</b> <span data-i18n="followers_label">người theo dõi</span>
                        </div>
                        <div class="ph-stat" onclick="openUserListModal('following')">
                            <b id="following-count">0</b> <span data-i18n="following_label">đang theo dõi</span>
                        </div>
                    </div>
                    
                    <div class="ph-bio-row">
                        <h3 id="profile-name" class="ph-fullname">Đang tải...</h3>
                        <div id="profile-id" class="ph-meta-id hidden" style="font-size: 0.8rem; color: var(--text-secondary); margin-top: 4px;"></div>
                        <div class="ph-bio" id="profile-bio" data-i18n="default_bio">
                            Đây là nơi chia sẻ những suy nghĩ và câu chuyện của tôi.
                        </div>
                    </div>
                </div>
            </div>

            <!-- Profile Tabs -->
            <div class="profile-tabs">
                <button class="profile-tab active" data-tab="gallery">
                    <i class="fa-solid fa-border-all"></i>
                    <span>Thư viện ảnh</span>
                </button>
                <button class="profile-tab" data-tab="notes">
                    <i class="fa-solid fa-bars-staggered"></i>
                    <span>Bài viết chữ</span>
                </button>
                <button class="profile-tab hidden" data-tab="friends" id="friends-tab-btn">
                    <i class="fa-solid fa-user-group"></i>
                    <span>Bạn bè</span>
                </button>
            </div>

            <!-- Tab Content Containers -->
            <div id="gallery-container" class="tab-content active">
                <div id="profile-posts-grid" class="posts-grid">
                    <div class="post-card skeleton"></div>
                </div>
                <div id="no-gallery-posts" class="no-posts hidden">
                    <i class="fa-solid fa-camera"></i>
                    <p>Chưa có hình ảnh nào.</p>
                </div>
            </div>

            <div id="notes-container" class="tab-content">
                <div id="profile-text-posts-feed" style="max-width: 600px; margin: 0 auto; display: flex; flex-direction: column; gap: 1.5rem;">
                </div>
                <div id="no-text-posts" class="no-posts hidden">
                    <i class="fa-solid fa-pen-nib"></i>
                    <p>Chưa có bài viết chữ nào.</p>
                </div>
            </div>

            <div id="friends-container" class="tab-content">
                <div class="user-list-grid" id="friends-grid">
                    <!-- Populated by JS -->
                </div>
                <div id="no-friends" class="no-posts hidden">
                    <i class="fa-solid fa-users-slash"></i>
                    <p>Danh sách bạn bè trống.</p>
                </div>
            </div>
        </div>
    </main>



    <!-- Scripts -->
    <script src="js/api.js?v=2.1"></script>
    <script src="js/lang.js"></script>
    <script src="js/i18n.js"></script>
    <script src="js/common.js?v=2.2"></script>
    <script src="js/post-actions.js?v=1.3"></script>
    <script src="js/notifications.js?v=1.1"></script>
    <script src="js/stories.js?v=2.2"></script>
    <script src="js/profile.js?v=2.2"></script>

    <!-- Story Viewer Modal -->
    <div id="story-viewer-modal" class="story-viewer-overlay hidden">
        <div class="story-viewer-container">
            <div class="story-viewer-header">
                <div class="story-progress-container" id="story-progress-bar"></div>
                <div class="story-user-info">
                    <img src="" id="story-viewer-avatar" class="mini-avatar">
                    <span id="story-viewer-name" class="story-viewer-name"></span>
                    <span id="story-viewer-time" class="story-viewer-time"></span>
                </div>
                <button class="story-close" onclick="closeStoryViewer()">&times;</button>
            </div>
            <div class="story-viewer-content" id="story-viewer-content">
                <!-- Image or Video -->
            </div>
            <div class="story-nav prev" onclick="prevStory()"><i class="fa-solid fa-chevron-left"></i></div>
            <div class="story-nav next" onclick="nextStory()"><i class="fa-solid fa-chevron-right"></i></div>
            
            <div class="story-viewer-footer">
                <div class="story-reply-container">
                    <input type="text" id="story-reply-input" placeholder="Gửi tin nhắn..." onfocus="pauseStory()" onblur="resumeStory()">
                    <button class="story-send-reply" onclick="sendStoryReply()"><i class="fa-regular fa-paper-plane"></i></button>
                </div>
                <button class="story-like-btn" id="story-like-btn" onclick="toggleLikeStory()">
                    <i class="fa-regular fa-heart"></i>
                </button>
            </div>

            <div id="story-author-tools" class="story-author-tools hidden">
                <div class="story-stats" onclick="openStoryLikesModal()">
                    <i class="fa-solid fa-eye"></i>
                    <span id="story-like-count-display">0 người đã tim</span>
                </div>
                <button class="story-delete-btn" onclick="deleteCurrentStory()">
                    <i class="fa-solid fa-trash-can"></i> Xóa tin
                </button>
            </div>
        </div>
    </div>

    <!-- Story Likes Modal (Bottom Sheet) -->
    <div id="story-likes-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <div class="bottom-sheet-handle"></div>
            <div class="modal-header">
                <h3>Người đã xem & tim</h3>
                <button class="close-btn" onclick="closeStoryLikesModal()">&times;</button>
            </div>
            <div class="modal-body" id="story-likes-list">
            </div>
        </div>
    </div>

    <!-- User List Modal -->
    <div id="user-list-modal" class="modal-overlay hidden">
        <div class="modal-container" style="background: var(--bg-color); border-radius: 12px; width: 100%; max-width: 400px; padding: 1.5rem; display: flex; flex-direction: column; max-height: 80vh;">
            <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); padding-bottom: 1rem; margin-bottom: 1rem;">
                <h3 id="user-list-modal-title" style="margin: 0; font-size: 1.1rem; text-align: center; flex: 1;">Danh sách</h3>
                <button onclick="document.getElementById('user-list-modal').classList.add('hidden')" style="background: none; border: none; font-size: 1.5rem; color: var(--text-primary); cursor: pointer;"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div id="user-list-modal-content" style="overflow-y: auto; flex: 1;">
            </div>
        </div>
    </div>
</body>

</html>
