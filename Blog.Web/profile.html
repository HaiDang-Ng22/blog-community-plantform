<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <link rel="icon" href="assets/favicon.png?v=2" type="image/png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="profile">Hồ sơ cá nhân - Zynk</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/common.css?v=1.5">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/home.css?v=1.7">
    <link rel="stylesheet" href="css/profile.css?v=1.7">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="home-page" data-i18n-title="profile">
    <header class="main-header">
        <nav class="nav-container container-wide">
            <div class="logo">
                <a href="index.html">
                    <div class="zynk-logo-clean logo-header"></div>
                </a>
            </div>
            
            <div class="nav-actions" id="nav-actions">
                <!-- Sẽ được điền bằng JS -->
            </div>
        </nav>
    </header>

    <main class="main-content container-wide">
        <div class="profile-container">
            <!-- Profile Header -->
            <div class="profile-header-card" id="profile-header-loading">
                <div class="profile-cover"></div>
                <div class="profile-info-section">
                    <div class="profile-avatar-wrapper">
                        <img src="https://ui-avatars.com/api/?name=User&background=random" id="profile-avatar" class="large-avatar" alt="Avatar">
                    </div>
                    <div class="profile-names">
                        <h2 id="profile-name" data-i18n="loading">Đang tải...</h2>
                        <p id="profile-username">@loading</p>
                    </div>
                    <div class="profile-bio" id="profile-bio" data-i18n="default_bio">
                        Đây là nơi chia sẻ những suy nghĩ và câu chuyện của tôi.
                    </div>
                    <div class="profile-stats-row">
                        <span><b id="post-count">0</b> <span data-i18n="posts_label">Bài viết</span></span>
                        <span><b id="follower-count">0</b> <span data-i18n="followers_label">Người theo dõi</span></span>
                        <span><b id="following-count">0</b> <span data-i18n="following_label">Đang theo dõi</span></span>
                    </div>
                    <div style="margin-top: 1.5rem;">
                        <button id="follow-btn" class="btn primary-btn" style="width: auto; padding: 0.6rem 2rem;" data-i18n="follow">Theo dõi</button>
                    </div>
                </div>
            </div>

            <!-- Profile Tabs -->
            <div class="profile-tabs">
                <button class="profile-tab active" data-tab="posts">
                    <i class="fa-solid fa-grid-2"></i>
                    <span data-i18n="posts_label">Bài viết</span>
                </button>
                <button class="profile-tab" data-tab="friends">
                    <i class="fa-solid fa-user-group"></i>
                    <span data-i18n="friends_label">Bạn bè</span>
                </button>
                <button class="profile-tab" data-tab="followers">
                    <i class="fa-solid fa-users"></i>
                    <span data-i18n="followers_label">Người theo dõi</span>
                </button>
                <button class="profile-tab" data-tab="following">
                    <i class="fa-solid fa-user-plus"></i>
                    <span data-i18n="following_label">Đang theo dõi</span>
                </button>
            </div>

            <!-- Tab Content Containers -->
            <div id="posts-container" class="tab-content active">
                <div id="profile-posts-grid" class="posts-grid">
                    <div class="post-card skeleton"></div>
                </div>
                <div id="no-posts" class="no-posts hidden">
                    <i class="fa-solid fa-note-sticky"></i>
                    <p data-i18n="no_posts_user">Chưa có bài đăng nào.</p>
                </div>
            </div>

            <div id="list-container" class="tab-content">
                <div class="user-list-grid" id="user-list-grid">
                    <!-- Populated by JS -->
                </div>
                <div id="no-users" class="no-posts hidden">
                    <i class="fa-solid fa-users-slash"></i>
                    <p data-i18n="empty_list">Danh sách trống.</p>
                </div>
            </div>
        </div>
    </main>

    <footer class="main-footer">
        <div class="container-wide">
            <p data-i18n="footer_copy">&copy; 2026 Zynk Community.</p>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="js/api.js?v=2.1"></script>
    <script src="js/lang.js"></script>
    <script src="js/i18n.js"></script>
    <script src="js/common.js?v=2.2"></script>
    <script src="js/post-actions.js?v=1.3"></script>
    <script src="js/notifications.js?v=1.1"></script>
    <script src="js/profile.js?v=2.0"></script>
</body>

</html>
