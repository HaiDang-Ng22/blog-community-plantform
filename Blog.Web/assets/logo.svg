<svg width="400" height="400" viewBox="0 0 400 350" xmlns="http://www.w3.org/2000/svg">
  <!-- Optimized Vector Recreation of Zynk Logo -->
  <g fill="#3b82f6">
    <!-- Top rounded bar of Z -->
    <rect x="70" y="60" width="260" height="28" rx="14"/>
    
    <!-- Diagonal of Z -->
    <path d="M 310 88 L 110 220 L 140 220 L 338 88 Z"/>

    <!-- Bottom rounded bar of Z -->
    <rect x="70" y="212" width="260" height="28" rx="14"/>
    
    <!-- Intertwined Infinity Loop -->
    <path d="M 204 116 C 144 116, 144 196, 204 196 C 264 196, 264 116, 204 116 M 204 116 C 264 116, 264 196, 204 196 C 144 196, 144 116, 204 116" 
          fill="none" stroke="#3b82f6" stroke-width="18" stroke-linecap="round"/>
  </g>
  
  <!-- ZYNK Typography (Clean Bold Style) -->
  <text x="200" y="320" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="78" font-weight="900" fill="#3b82f6" letter-spacing="-3">ZYNK</text>
</svg>
