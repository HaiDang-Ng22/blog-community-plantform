<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zynk - Nền tảng Chia sẻ Kiến thức</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/common.css?v=1.2">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/home.css?v=1.3">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="home-page">
    <header class="main-header">
        <nav class="nav-container container-wide">
            <div class="logo">
                <a href="index.html">ZYNK</a>
            </div>
            

            <div class="nav-actions" id="nav-actions">
                <!-- Sẽ được điền bằng JS dựa trên trạng thái đăng nhập -->
                <a href="auth.html" class="btn-login-link">Đăng nhập</a>
                <a href="auth.html" class="btn-register-link">Bắt đầu ngay</a>
            </div>
        </nav>
    </header>

    <main class="main-content container-wide">
        <!-- Quick Post Area -->
        <section class="quick-post-section" id="quick-post-auth-only">
            <div class="quick-post-card">
                <img src="https://ui-avatars.com/api/?name=User&background=random" id="current-user-avatar" class="mini-avatar" alt="Avatar">
                <div class="quick-post-input" onclick="window.location.href='create-post.html'">
                    Bạn đang nghĩ gì thế?
                </div>
            </div>
        </section>

        <section class="posts-section">
            <div class="section-title">
                <h2>Bảng tin</h2>
                <div class="filter-tabs">
                    <button class="filter-btn active">Mới nhất</button>
                    <button class="filter-btn">Đang theo dõi</button>
                </div>
            </div>

            <div id="posts-grid" class="posts-grid">
                <!-- Skeleton Loading -->
                <div class="post-card skeleton"></div>
            </div>

            <div id="no-posts" class="no-posts hidden">
                <i class="fa-solid fa-wind"></i>
                <p>Mọi thứ thật yên tĩnh. Hãy là người đầu tiên đăng bài!</p>
            </div>
        </section>
    </main>

    <footer class="main-footer">
        <div class="container-wide">
            <p>&copy; 2026 Zynk Community. Made with LV for developers.</p>
        </div>
    </footer>

    <!-- Report Modal -->
    <div id="report-modal" class="modal-overlay hidden">
        <div class="modal-content report-modal-content">
            <div class="modal-header">
                <h3>Báo cáo vi phạm</h3>
                <button class="close-btn" onclick="closeReportModal()">&times;</button>
            </div>
            <div class="modal-body">
                <p style="margin-bottom: 1rem; font-size: 0.9rem; color: var(--text-secondary);">Chúng tôi sẽ xem xét bài viết này dựa trên lý do bạn cung cấp.</p>
                <form id="report-form">
                    <input type="hidden" id="report-post-id">
                    <input type="hidden" id="report-author-id">
                    
                    <div class="report-options">
                        <label class="report-opt">
                            <input type="radio" name="report-reason" value="Tôi không thích nội dung này" checked>
                            <span>Tôi không thích nội dung này</span>
                        </label>
                        <label class="report-opt">
                            <input type="radio" name="report-reason" value="Vấn đề nhạy cảm/khiêu dâm">
                            <span>Vấn đề nhạy cảm/khiêu dâm</span>
                        </label>
                        <label class="report-opt">
                            <input type="radio" name="report-reason" value="Bạo lực">
                            <span>Bạo lực</span>
                        </label>
                        <label class="report-opt">
                            <input type="radio" name="report-reason" value="Phản động">
                            <span>Phản động</span>
                        </label>
                        <label class="report-opt">
                            <input type="radio" name="report-reason" value="Khác" id="reason-other-radio">
                            <span>Khác...</span>
                        </label>
                    </div>

                    <textarea id="report-other-text" class="hidden" placeholder="Vui lòng cung cấp thêm thông tin..." rows="3" style="width: 100%; margin-top: 10px; padding: 10px; border-radius: 8px; border: 1px solid var(--border-color);"></textarea>
                    
                    <div style="margin-top: 1.5rem; display: flex; gap: 10px;">
                        <button type="button" class="btn secondary-btn" style="width: 100%;" onclick="closeReportModal()">Hủy</button>
                        <button type="submit" class="btn primary-btn" style="width: 100%;" id="submit-report-btn">Gửi báo cáo</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/api.js?v=1.4"></script>
    <script src="js/auth.js?v=1.4"></script>
    <script src="js/common.js?v=1.4"></script>
    <script src="js/notifications.js?v=1.4"></script>
    <script src="js/post-actions.js?v=1.6"></script>
    <script src="js/home.js?v=1.6"></script>
</body>

</html>
