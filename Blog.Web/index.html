<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="app_name">Zynk - Nền tảng Chia sẻ Kiến thức</title>
    <meta name="description" content="Zynk - Mạng xã hội chia sẻ kiến thức, hình ảnh và kết nối cộng đồng">
    <link rel="icon" href="assets/favicon.png?v=2" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/common.css?v=2.6">
    <link rel="stylesheet" href="css/home.css?v=2.6">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="home-page" data-i18n-title="app_name">

    <main class="main-content" id="main-content">
        <div class="home-layout">
            <!-- Left: Feed -->
            <div class="feed-col">
                <!-- Feed Tabs -->
                <div class="home-tabs">
                    <div class="home-tab active" data-type="discover">Khám phá</div>
                    <div class="home-tab" data-type="following">Đang theo dõi</div>
                </div>

                <!-- Quick Post -->
                <div class="quick-post-card" id="quick-post-auth-only" style="display:none;"
                    onclick="location.href='create-post.html'">
                    <img src="https://ui-avatars.com/api/?name=U&background=random" id="quick-post-avatar" alt="Avatar">
                    <span>Bạn đang nghĩ gì thế?</span>
                </div>

                <!-- Posts -->
                <div id="posts-grid" class="posts-grid">
                    <div class="post-card skeleton"></div>
                </div>

                <div id="no-posts" class="no-posts hidden">
                    <i class="fa-regular fa-compass"></i>
                    <p>Chưa có bài viết nào. Hãy là người đầu tiên chia sẻ!</p>
                </div>
            </div>

            <!-- Right: Sidebar Widgets -->
            <aside class="right-sidebar" id="right-sidebar-col">
                <!-- User widget -->
                <div class="widget user-widget hidden" id="user-sidebar-widget">
                    <div class="user-widget-inner">
                        <img src="" id="sidebar-user-avatar" class="widget-avatar" alt="Avatar">
                        <div class="widget-user-info">
                            <span class="widget-name" id="sidebar-user-name"></span>
                            <span class="widget-username" id="sidebar-user-username"></span>
                        </div>
                        <a href="profile.html" class="widget-action-link">Xem hồ sơ</a>
                    </div>
                </div>

                <!-- Suggestions -->
                <div class="widget suggestions-widget">
                    <div class="widget-header">
                        <span class="widget-title">Gợi ý cho bạn</span>
                        <a href="#" class="widget-see-all">Xem tất cả</a>
                    </div>
                    <div id="suggestions-list" class="suggestions-list">
                        <div class="loading-spinner"></div>
                    </div>
                </div>

                <!-- Footer links -->
                <div class="widget-footer-links">
                    <a href="about.html">Giới thiệu</a>
                    <a href="help.html">Trợ giúp</a>
                    <a href="press.html">Báo chí</a>
                    <a href="api.html">API</a>
                    <a href="jobs.html">Việc làm</a>
                    <a href="privacy.html">Quyền riêng tư</a>
                    <a href="terms.html">Điều khoản</a>
                    <span class="footer-copy">© 2026 Zynk Community.</span>
                </div>
            </aside>
        </div>
    </main>

    <!-- Report Modal -->
    <div id="report-modal" class="modal-overlay hidden">
        <div class="modal-content report-modal-content">
            <div class="modal-header">
                <h3>Báo cáo vi phạm</h3>
                <button class="close-btn" onclick="closeReportModal()">&times;</button>
            </div>
            <div class="modal-body">
                <form id="report-form">
                    <input type="hidden" id="report-post-id">
                    <input type="hidden" id="report-author-id">
                    <div class="report-options">
                        <label class="report-opt"><input type="radio" name="report-reason"
                                value="Tôi không thích nội dung này" checked><span>Tôi không thích nội dung
                                này</span></label>
                        <label class="report-opt"><input type="radio" name="report-reason"
                                value="Vấn đề nhạy cảm/khiêu dâm"><span>Vấn đề nhạy cảm/khiêu dâm</span></label>
                        <label class="report-opt"><input type="radio" name="report-reason" value="Bạo lực"><span>Bạo
                                lực</span></label>
                        <label class="report-opt"><input type="radio" name="report-reason" value="Phản động"><span>Phản
                                động</span></label>
                        <label class="report-opt"><input type="radio" name="report-reason" value="Khác"
                                id="reason-other-radio"><span>Khác...</span></label>
                    </div>
                    <textarea id="report-other-text" class="hidden" placeholder="Vui lòng cung cấp thêm thông tin..."
                        rows="3"
                        style="width:100%;margin-top:10px;padding:10px;border-radius:8px;border:1px solid #dbdbdb;"></textarea>
                    <div style="margin-top:1.5rem;display:flex;gap:10px;">
                        <button type="button" class="btn secondary-btn" style="width:100%;"
                            onclick="closeReportModal()">Hủy</button>
                        <button type="submit" class="btn primary-btn" style="width:100%;" id="submit-report-btn">Gửi báo
                            cáo</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="js/api.js?v=4.1"></script>
    <script src="js/lang.js?v=4.1"></script>
    <script src="js/i18n.js?v=4.1"></script>
    <script src="js/common.js?v=4.1"></script>
    <script src="js/notifications.js?v=4.1"></script>
    <script src="js/post-actions.js?v=4.1"></script>
    <script src="js/home.js?v=4.1"></script>
</body>

</html>
