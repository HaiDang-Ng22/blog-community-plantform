<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cài đặt tài khoản - Zynk</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/auth.css"> <!-- Reusing some form styles -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .settings-container { max-width: 600px; margin: 2rem auto; padding: 2rem; background: #fff; border-radius: 12px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-weight: 600; font-size: 0.9rem; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 0.75rem; border: 1px solid #e2e8f0; border-radius: 8px; font-family: inherit; }
        .preview-img { width: 100px; height: 100px; object-fit: cover; border-radius: 50%; margin-top: 0.5rem; border: 2px solid #6366f1; }
        .preview-cover { width: 100%; height: 120px; object-fit: cover; border-radius: 8px; margin-top: 0.5rem; border: 1px solid #e2e8f0; }
        .btn-row { display: flex; gap: 1rem; margin-top: 2rem; }
    </style>
</head>

<body class="home-page">
    <header class="main-header">
        <nav class="nav-container container-wide">
            <div class="logo">
                <a href="index.html">ZYNK</a>
            </div>
            <div class="nav-actions" id="nav-actions"></div>
        </nav>
    </header>

    <main class="main-content container-wide">
        <div class="settings-container">
            <h3>Cài đặt hồ sơ</h3>
            <p style="color: #64748b; margin-bottom: 2rem; font-size: 0.9rem;">Cập nhật thông tin cá nhân và cách người khác nhìn thấy bạn.</p>

            <form id="settings-form">
                <div class="form-group">
                    <label for="set-username">Tên người dùng (ID/Handle)</label>
                    <input type="text" id="set-username" required placeholder="@username">
                    <small style="color: #94a3b8;">Dùng để tìm kiếm và định danh duy nhất (ví dụ: @hadang).</small>
                </div>

                <div class="form-group">
                    <label for="set-fullname">Họ và tên</label>
                    <input type="text" id="set-fullname" required>
                </div>

                <div class="form-group">
                    <label for="set-bio">Tiểu sử</label>
                    <textarea id="set-bio" rows="3" placeholder="Giới thiệu ngắn về bản thân..."></textarea>
                </div>

                <div class="form-group">
                    <label for="set-gender">Giới tính</label>
                    <select id="set-gender">
                        <option value="Male">Nam</option>
                        <option value="Female">Nữ</option>
                        <option value="Other">Khác</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Ảnh đại diện</label>
                    <div style="display: flex; gap: 1rem; align-items: center;">
                        <img id="avatar-preview" src="https://via.placeholder.com/100" class="preview-img" style="margin-top:0">
                        <button type="button" class="btn secondary-btn" onclick="document.getElementById('avatar-file').click()" style="width: auto; height: fit-content; padding: 0.5rem 1rem;">Tải ảnh đại diện</button>
                    </div>
                    <input type="file" id="avatar-file" accept="image/*" style="display: none;" onchange="handleProfileUpload(this, 'avatar')">
                    <input type="hidden" id="set-avatar-url">
                </div>

                <div class="form-group">
                    <label>Ảnh bìa</label>
                    <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                        <img id="cover-preview" src="https://via.placeholder.com/400x120" class="preview-cover" style="margin-top:0">
                        <button type="button" class="btn secondary-btn" onclick="document.getElementById('cover-file').click()" style="width: auto; padding: 0.5rem 1rem;">Chọn ảnh bìa mới</button>
                    </div>
                    <input type="file" id="cover-file" accept="image/*" style="display: none;" onchange="handleProfileUpload(this, 'cover')">
                    <input type="hidden" id="set-cover-url">
                </div>

                <div id="settings-msg" class="message-box hidden" style="margin-bottom: 1rem;"></div>

                <div class="btn-row">
                    <button type="submit" class="btn primary-btn" id="save-settings-btn">Lưu thay đổi</button>
                    <button type="button" class="btn secondary-btn" onclick="history.back()">Hủy</button>
                </div>
            </form>
        </div>
    </main>

    <script src="js/api.js?v=1.1"></script>
    <script src="js/common.js?v=1.1"></script>
    <script src="js/settings.js?v=1.1"></script>
</body>

</html>
