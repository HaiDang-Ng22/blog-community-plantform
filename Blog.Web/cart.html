<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="assets/favicon.png?v=2" type="image/png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="cart_title">Giỏ hàng - Zynk Shop</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/common.css?v=1.5">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .cart-layout { max-width: 1000px; margin: 3rem auto; display: grid; grid-template-columns: 1fr 400px; gap: 2rem; align-items: start; }
        @media (max-width: 900px) { .cart-layout { grid-template-columns: 1fr; } }
        .cart-card { background: var(--glass-bg); backdrop-filter: blur(10px); border-radius: 1.5rem; border: var(--glass-border); padding: 2rem; box-shadow: var(--shadow-md); }
        .cart-item { display: flex; align-items: center; gap: 1.5rem; padding: 1.5rem; border-bottom: 1px solid #e2e8f0; }
        .cart-item:last-child { border-bottom: none; }
        .cart-item img { width: 80px; height: 80px; border-radius: 12px; object-fit: cover; }
        .cart-item-info { flex: 1; }
        .cart-item-info h4 { margin-bottom: 0.5rem; font-size: 1.1rem; }
        .cart-price { font-weight: 700; color: #2563eb; }
        .cart-qty { font-size: 0.9rem; color: #64748b; }
        .cart-total { font-size: 1.5rem; font-weight: 800; margin-bottom: 1.5rem; display: flex; justify-content: space-between; }
        
        .cart-shop-group { margin-bottom: 1.5rem; background: #fff; border-radius: 12px; border: 1px solid #cbd5e1; overflow: hidden; }
        .cart-shop-header { padding: 1rem 1.5rem; border-bottom: 1px solid #e2e8f0; display: flex; align-items: center; gap: 10px; font-weight: 700; background: #f8fafc; font-size:1.05rem; }
        .checkbox-custom { width: 20px; height: 20px; cursor: pointer; accent-color: #3b82f6; border-radius: 4px; }
        .cart-select-all { display: flex; align-items: center; gap: 10px; padding: 1rem 0 1.5rem; font-weight: 600; color: #475569; }
        
        .checkout-box { background: white; border-radius: 1.5rem; padding: 2rem; box-shadow: var(--shadow-sm); border: 1px solid #e2e8f0; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-weight: 600; font-size: 0.9rem; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 0.75rem 1rem; border-radius: 0.75rem; border: 1px solid #cbd5e1; outline: none; background: #f8fafc; font-family: inherit; }
        
        .payment-methods { display: flex; flex-direction: column; gap: 0.75rem; margin-top: 1.5rem; }
        .payment-label { display: flex; align-items: center; gap: 10px; padding: 1rem; border: 1px solid #cbd5e1; border-radius: 0.75rem; cursor: pointer; transition: 0.2s; }
        .payment-label:hover { border-color: #3b82f6; background: #eff6ff; }
        .payment-label input { width: auto; margin: 0; }
        
        .saved-address-card { border: 1px solid #cbd5e1; padding: 1rem; border-radius: 0.75rem; cursor: pointer; margin-bottom: 0.75rem; }
        .saved-address-card.selected { border-color: #3b82f6; background: #eff6ff; }
        .btn-toggle-saved { font-size: 0.9rem; color: #3b82f6; cursor: pointer; display: inline-block; margin-bottom: 1rem; text-decoration: underline; font-weight: 600; }
    </style>
</head>
<body class="home-page" data-i18n-title="cart_title">
    <header class="main-header">
        <nav class="nav-container container-wide">
            <div class="logo">
                <a href="index.html">
                    <div class="zynk-logo-clean logo-header"></div>
                </a>
            </div>
            <div class="nav-actions" id="nav-actions"></div>
        </nav>
    </header>

    <main class="container-wide cart-layout">
        <div class="cart-card">
            <h2 style="margin-bottom: 1.5rem;"><i class="fa fa-shopping-cart"></i> <span data-i18n="cart_title">Giỏ hàng của bạn</span></h2>
            <div id="cart-list">
                <!-- Data from JS -->
            </div>
        </div>

        <div class="checkout-box" id="checkout-section">
            <div class="cart-total" style="font-size: 1.1rem; color: #64748b; margin-bottom: 0.5rem; border: none;">
                <span data-i18n="subtotal">Tạm tính:</span>
                <span id="subtotal-price">0đ</span>
            </div>
            <div class="cart-total" style="font-size: 1.1rem; color: #64748b; margin-bottom: 1rem; border: none;">
                <span data-i18n="shipping_fee">Phí vận chuyển:</span>
                <span id="shipping-fee">0đ</span>
            </div>
            <div class="cart-total">
                <span data-i18n="total_label">Tổng cộng:</span>
                <span id="total-price" style="color: #ef4444;">0đ</span>
            </div>
            <hr style="margin: 1.5rem 0; border: none; border-top: 1px solid #e2e8f0;">
            
            <h3 style="margin-bottom: 1rem; display: flex; justify-content: space-between; align-items: center;">
                <span data-i18n="shipping_info_title">Thông tin nhận hàng</span>
                <span id="btn-show-saved" class="btn-toggle-saved hidden" onclick="toggleSavedAddresses()"><i class="fa-solid fa-address-book"></i> <span data-i18n="saved_addresses">Địa chỉ đã lưu</span></span>
            </h3>

            <div id="saved-addresses-list" class="hidden" style="margin-bottom: 1.5rem;">
                <!-- Rendered from JS -->
            </div>

            <div id="new-address-form">
                <div class="form-group">
                    <label data-i18n="full_name">Họ và tên</label>
                    <input type="text" id="ship-name" placeholder="Ví dụ: Nguyễn Văn A" data-i18n-placeholder="full_name_placeholder" required>
                </div>
                <div class="form-group">
                    <label data-i18n="phone_number">Số điện thoại</label>
                    <input type="tel" id="ship-phone" placeholder="09xxxxxxxx" data-i18n-placeholder="phone_placeholder" required>
                </div>
                
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div class="form-group">
                        <label data-i18n="province_label">Tỉnh / Thành phố</label>
                        <select id="ship-province" onchange="loadDistricts()" required>
                            <option value="" data-i18n="select_province">Chọn Tỉnh/Thành</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label data-i18n="district_label">Quận / Huyện</label>
                        <select id="ship-district" required disabled>
                            <option value="" data-i18n="select_district">Chọn Quận/Huyện</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label data-i18n="specific_address_label">Địa chỉ cụ thể</label>
                    <input type="text" id="ship-specific" placeholder="Số nhà, Tên đường, Tòa nhà..." data-i18n-placeholder="specific_address_placeholder" required>
                </div>
                
                <label style="display: flex; align-items: center; gap: 8px; font-size: 0.9rem; cursor: pointer; color: #64748b;">
                    <input type="checkbox" id="save-address-cb" checked><span data-i18n="save_address_future">Lưu thông tin địa chỉ này cho lần sau</span>
                </label>
            </div>

            <div class="form-group" style="margin-top: 1rem;">
                <label data-i18n="order_note_optional">Ghi chú đơn hàng (Tùy chọn)</label>
                <textarea id="ship-note" rows="2" placeholder="Giao giờ hành chính, gọi trước khi giao..." data-i18n-placeholder="order_note_placeholder"></textarea>
            </div>

            <h3 style="margin: 2rem 0 1rem;" data-i18n="payment_method_title">Phương thức thanh toán</h3>
            <div class="payment-methods">
                <label class="payment-label">
                    <input type="radio" name="payment_method" value="COD" checked>
                    <i class="fa-solid fa-money-bill-wave" style="color: #10b981; font-size: 1.2rem;"></i>
                    <span data-i18n="payment_cod">Thanh toán khi nhận hàng (COD)</span>
                </label>
                <label class="payment-label">
                    <input type="radio" name="payment_method" value="BANK">
                    <i class="fa-solid fa-credit-card" style="color: #3b82f6; font-size: 1.2rem;"></i>
                    <span data-i18n="payment_bank">Thẻ ngân hàng / Chuyển khoản</span>
                </label>
            </div>

            <button class="btn primary-btn" style="width: 100%; margin-top: 2rem; padding: 1rem; font-size: 1.1rem; border-radius: 1rem;" onclick="checkout()" data-i18n="order_now">
                Đặt hàng ngay
            </button>
        </div>
    </main>

    <script src="js/api.js?v=1.5"></script>
    <script src="js/common.js?v=1.5"></script>
    <script>
        let provincesData = [];
        let savedAddresses = [];

        document.addEventListener('DOMContentLoaded', async () => {
            renderCart();
            await loadSavedAddresses();
            await fetchProvinces();
            
            // Pre-fill user info if available
            const userInfo = JSON.parse(localStorage.getItem('user_info') || '{}');
            if (userInfo.fullName) document.getElementById('ship-name').value = userInfo.fullName;
            if (userInfo.phoneNumber) document.getElementById('ship-phone').value = userInfo.phoneNumber;
        });

        function renderCart() {
            const list = document.getElementById('cart-list');
            const cart = JSON.parse(localStorage.getItem('zynk_cart') || '[]');
            
            if (cart.length === 0) {
                list.innerHTML = `<div style="text-align:center; padding: 3rem;">${window.t('empty_cart')}</div>`;
                document.getElementById('checkout-section').style.display = 'none';
                return;
            }
            document.getElementById('checkout-section').style.display = 'block';

            // Group by shopName
            const grouped = {};
            cart.forEach((item, index) => {
                const shop = item.shopName || 'Shop Zynk';
                if (!grouped[shop]) grouped[shop] = [];
                grouped[shop].push({ ...item, originalIndex: index });
            });

            let html = `
                <div class="cart-select-all">
                    <input type="checkbox" id="check-all-global" class="checkbox-custom" checked onchange="toggleAllGlobal(this)">
                    <label for="check-all-global" style="cursor: pointer;">${window.t('select_all')} (${cart.length})</label>
                </div>
            `;

            for (const [shop, items] of Object.entries(grouped)) {
                html += `
                    <div class="cart-shop-group">
                        <div class="cart-shop-header">
                            <input type="checkbox" class="checkbox-custom shop-cb" data-shop="${shop}" checked onchange="toggleShop('${shop}', this)">
                            <i class="fa fa-shop" style="color: #64748b;"></i> ${shop}
                        </div>
                        <div class="cart-shop-items">
                `;
                
                items.forEach(item => {
                    html += `
                        <div class="cart-item">
                            <input type="checkbox" class="checkbox-custom item-cb shop-${shop.replace(/\s+/g, '-')}" data-index="${item.originalIndex}" data-shop="${shop}" checked onchange="toggleItem('${shop}')">
                            <img src="${item.img || 'https://via.placeholder.com/80'}">
                            <div class="cart-item-info">
                                <h4>${item.name}</h4>
                                ${item.variantName ? `<div style="font-size:0.85rem; color:#64748b; margin-bottom:5px;">${window.t('type_label') || 'Loại'}: ${item.variantName}</div>` : ''}
                                <div class="cart-qty">${window.t('quantity_label') || 'Số lượng'}: ${item.qty}</div>
                            </div>
                            <div class="cart-price">${new Intl.NumberFormat('vi-VN', { style: 'currency', currency: 'VND' }).format(item.price * item.qty)}</div>
                            <button class="btn-action danger" onclick="removeFromCart(${item.originalIndex})"><i class="fa fa-trash"></i></button>
                        </div>
                    `;
                });

                html += `
                        </div>
                    </div>
                `;
            }

            list.innerHTML = html;
            updateTotalPrice();
        }

        // --- Selection Logic ---
        function toggleAllGlobal(checkbox) {
            const isChecked = checkbox.checked;
            document.querySelectorAll('.item-cb, .shop-cb').forEach(cb => cb.checked = isChecked);
            updateTotalPrice();
        }

        function toggleShop(shop, checkbox) {
            const isChecked = checkbox.checked;
            document.querySelectorAll(`.item-cb.shop-${shop.replace(/\s+/g, '-')}`).forEach(cb => cb.checked = isChecked);
            syncGlobalCheck();
            updateTotalPrice();
        }

        function toggleItem(shop) {
            const shopItems = document.querySelectorAll(`.item-cb.shop-${shop.replace(/\s+/g, '-')}`);
            const shopCb = document.querySelector(`.shop-cb[data-shop="${shop}"]`);
            
            const allChecked = Array.from(shopItems).every(cb => cb.checked);
            if (shopCb) shopCb.checked = allChecked;
            
            syncGlobalCheck();
            updateTotalPrice();
        }

        function syncGlobalCheck() {
            const allItems = document.querySelectorAll('.item-cb');
            const globalCb = document.getElementById('check-all-global');
            if (globalCb && allItems.length > 0) {
                globalCb.checked = Array.from(allItems).every(cb => cb.checked);
            }
        }

        function updateTotalPrice() {
            const cart = JSON.parse(localStorage.getItem('zynk_cart') || '[]');
            const checkedBoxes = document.querySelectorAll('.item-cb:checked');
            
            let subtotal = 0;
            checkedBoxes.forEach(cb => {
                const idx = parseInt(cb.getAttribute('data-index'));
                const item = cart[idx];
                if (item) subtotal += item.price * item.qty;
            });

            // Calculate Shipping Fee
            let shipping = 0;
            if (checkedBoxes.length > 0) {
                const province = document.getElementById('ship-province').value;
                // Simple logic: If province selected, calculate. If not, use base.
                // Assuming base 15k, inter-province 35k.
                // We'll just use a flat 25k for now if any province is selected, or 0 if nothing selected.
                shipping = 25000;
            }

            const total = subtotal + shipping;

            document.getElementById('subtotal-price').textContent = new Intl.NumberFormat('vi-VN', { style: 'currency', currency: 'VND' }).format(subtotal);
            document.getElementById('shipping-fee').textContent = new Intl.NumberFormat('vi-VN', { style: 'currency', currency: 'VND' }).format(shipping);
            document.getElementById('total-price').textContent = new Intl.NumberFormat('vi-VN', { style: 'currency', currency: 'VND' }).format(total);
        }

        function removeFromCart(index) {
            let cart = JSON.parse(localStorage.getItem('zynk_cart') || '[]');
            cart.splice(index, 1);
            localStorage.setItem('zynk_cart', JSON.stringify(cart));
            renderCart();
            if (window.updateCartBadge) window.updateCartBadge();
        }

        async function loadSavedAddresses() {
            try {
                savedAddresses = await window.api.get('orders/my-addresses');
                if (savedAddresses.length > 0) {
                    document.getElementById('btn-show-saved').classList.remove('hidden');
                    const html = savedAddresses.map(a => `
                        <div class="saved-address-card" onclick="selectSavedAddress('${a.id}')" id="addr-card-${a.id}">
                            <div style="font-weight: 600; margin-bottom: 4px;">${a.fullName} - ${a.phoneNumber} ${a.isDefault ? `<span class="badge badge-success" style="font-size:0.7rem; padding: 2px 6px;">${window.t('default_label') || 'Mặc định'}</span>` : ''}</div>
                            <div style="font-size: 0.9rem; color: #64748b;">${a.specificAddress}, ${a.districtWard}, ${a.province}</div>
                        </div>
                    `).join('');
                    document.getElementById('saved-addresses-list').innerHTML = html;
                    
                    // Auto select default
                    const defaultAddr = savedAddresses.find(a => a.isDefault) || savedAddresses[0];
                    if (defaultAddr) selectSavedAddress(defaultAddr.id);
                }
            } catch (e) {
                console.log('No saved addresses or not logged in');
            }
        }

        function toggleSavedAddresses() {
            const list = document.getElementById('saved-addresses-list');
            list.classList.toggle('hidden');
        }

        function selectSavedAddress(id) {
            document.querySelectorAll('.saved-address-card').forEach(el => el.classList.remove('selected'));
            document.getElementById('addr-card-' + id).classList.add('selected');
            
            const addr = savedAddresses.find(a => a.id === id);
            if (addr) {
                document.getElementById('ship-name').value = addr.fullName;
                document.getElementById('ship-phone').value = addr.phoneNumber;
                document.getElementById('ship-specific').value = addr.specificAddress;
                
                // Set province and district (Simulated since matching exactly depends on open-api structure)
                // In a perfect system we'd bind codes. Here we just set the text if it matches, or hide the dropdowns
                document.getElementById('save-address-cb').checked = false; 
                // We'll rely on specific text when submitting if these selects are not perfectly matched
            }
        }

        async function fetchProvinces() {
            try {
                const res = await fetch('https://provinces.open-api.vn/api/?depth=2');
                provincesData = await res.json();
                const provinceSelect = document.getElementById('ship-province');
                provincesData.forEach(p => {
                    const opt = document.createElement('option');
                    opt.value = p.code;
                    opt.textContent = p.name;
                    provinceSelect.appendChild(opt);
                });
            } catch (e) {
                console.error("Lỗi tải API tỉnh thành: ", e);
            }
        }

        function loadDistricts() {
            const provinceCode = document.getElementById('ship-province').value;
            const districtSelect = document.getElementById('ship-district');
            districtSelect.innerHTML = '<option value="">Chọn Quận/Huyện</option>';
            
            if (!provinceCode) {
                districtSelect.disabled = true;
                return;
            }
            
            const province = provincesData.find(p => p.code == provinceCode);
            if (province && province.districts) {
                province.districts.forEach(d => {
                    const opt = document.createElement('option');
                    opt.value = d.name; // Use name directly for DB
                    opt.textContent = d.name;
                    districtSelect.appendChild(opt);
                });
                districtSelect.disabled = false;
            }
            updateTotalPrice();
        }

        async function checkout() {
            const name = document.getElementById('ship-name').value;
            const phone = document.getElementById('ship-phone').value;
            const specific = document.getElementById('ship-specific').value;
            
            let provinceText = "";
            let districtText = document.getElementById('ship-district').value;
            
            const provSel = document.getElementById('ship-province');
            if (provSel.selectedIndex > 0) {
                provinceText = provSel.options[provSel.selectedIndex].text;
            }

            if (!name || !phone || !specific) {
                return window.common?.showToast ? window.common.showToast('Vui lòng điền đủ thông tin nhận hàng', 'error') : alert('Vui lòng nhập đủ thông tin');
            }

            const paymentMethod = document.querySelector('input[name="payment_method"]:checked').value;
            const saveAddress = document.getElementById('save-address-cb').checked;
            const note = document.getElementById('ship-note').value;

            const cart = JSON.parse(localStorage.getItem('zynk_cart') || '[]');
            const checkedBoxes = document.querySelectorAll('.item-cb:checked');
            
            if (checkedBoxes.length === 0) {
                return window.common?.showToast ? window.common.showToast('Vui lòng chọn ít nhất 1 sản phẩm để thanh toán', 'error') : alert('Vui lòng chọn ít nhất 1 sản phẩm');
            }

            const itemsToBuy = [];
            const indicesToRemove = [];
            
            checkedBoxes.forEach(cb => {
                const idx = parseInt(cb.getAttribute('data-index'));
                itemsToBuy.push({ productId: cart[idx].id, quantity: cart[idx].qty });
                indicesToRemove.push(idx);
            });
            
            const fullAddress = `${specific}, ${districtText}, ${provinceText}`.replace(/, ,/g, ',');

            const data = {
                customerName: name,
                phoneNumber: phone,
                province: provinceText,
                districtWard: districtText,
                specificAddress: specific,
                shippingAddress: fullAddress, // legacy
                paymentMethod: paymentMethod,
                shippingFee: 25000, // Matching the UI calculation
                saveAddress: saveAddress,
                customerNote: note,
                items: itemsToBuy
            };

            const btn = document.querySelector('button[onclick="checkout()"]');
            const orig = btn.innerHTML;
            btn.innerHTML = `<i class="fa fa-spinner fa-spin"></i> ${window.t('processing')}`;
            btn.disabled = true;

            try {
                await window.api.post('orders/checkout', data);
                if (window.common?.showToast) window.common.showToast('Đặt hàng thành công!', 'success');
                else alert('Đặt hàng thành công!');
                
                // Only remove the bought items from cart
                const newCart = cart.filter((_, idx) => !indicesToRemove.includes(idx));
                localStorage.setItem('zynk_cart', JSON.stringify(newCart));
                
                setTimeout(() => {
                    window.location.href = 'my-orders.html';
                }, 1500);
            } catch (e) {
                if (window.common?.showToast) window.common.showToast('Lỗi đặt hàng: ' + e.message, 'error');
                else alert('Lỗi đặt hàng: ' + e.message);
                btn.innerHTML = orig;
                btn.disabled = false;
            }
        }
    </script>
    <script src="js/api.js?v=2.0"></script>
    <script src="js/lang.js"></script>
    <script src="js/i18n.js"></script>
    <script src="js/common.js?v=2.2"></script>
</body>
</html>
