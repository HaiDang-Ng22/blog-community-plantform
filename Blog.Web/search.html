<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="assets/favicon.png?v=2" type="image/png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="search_title">Tìm kiếm - Zynk</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/common.css?v=2.2">
    <link rel="stylesheet" href="css/home.css?v=2.2">
    <link rel="stylesheet" href="css/search.css?v=2.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="home-page" data-i18n-title="search_title">
    <main class="main-content search-page">
        <div class="home-layout">
            <div class="feed-col search-center">
                <div class="search-page-header">
                    <div class="search-bar-wrap">
                        <i class="fa-solid fa-magnifying-glass search-bar-icon"></i>
                        <input type="text" id="page-search-input" data-i18n="search_input_placeholder" placeholder="Tìm người dùng, bài viết, reels, hashtag, sản phẩm..." autocomplete="off">
                        <button class="search-clear-btn hidden" id="search-clear-btn" title="Xóa"><i class="fa-solid fa-xmark"></i></button>
                    </div>
                    <div class="search-tabs" id="search-tabs">
                        <button class="search-tab active" data-tab="all" data-i18n="tab_all">Tất cả</button>
                        <button class="search-tab" data-tab="users" data-i18n="tab_users">Người dùng</button>
                        <button class="search-tab" data-tab="posts" data-i18n="tab_posts">Bài viết</button>
                        <button class="search-tab" data-tab="reels" data-i18n="tab_reels">Reels</button>
                        <button class="search-tab" data-tab="hashtags" data-i18n="tab_hashtags">Hashtag</button>
                        <button class="search-tab" data-tab="groups" data-i18n="tab_groups">Cộng đồng</button>
                        <button class="search-tab" data-tab="products" data-i18n="tab_products">Sản phẩm</button>
                        <button class="search-tab" data-tab="shops" data-i18n="tab_shops">Cửa hàng</button>
                    </div>
                </div>
                <div id="search-suggestions" class="search-suggestions hidden"></div>
                <div id="search-body" class="search-body">
                    <div id="search-default-view">
                        <div id="recent-searches-section" class="search-card hidden">
                            <div class="search-card-header">
                                <span data-i18n="recent_searches">Tìm kiếm gần đây</span>
                                <button class="clear-all-btn" id="clear-all-history" data-i18n="clear_all">Xóa tất cả</button>
                            </div>
                            <div id="recent-list"></div>
                        </div>
                        <div class="search-card">
                            <div class="search-card-header">
                                <span><i class="fa-solid fa-fire" style="color:#f97316;"></i> <span data-i18n="trending_now">Đang thịnh hành</span></span>
                            </div>
                            <div class="trending-list" id="trending-list">
                                <div class="trending-item"><span class="trending-rank">1</span><span>#laptrinh</span><small>12.5k bài viết</small></div>
                                <div class="trending-item"><span class="trending-rank">2</span><span>#congnghe</span><small>8.2k bài viết</small></div>
                                <div class="trending-item"><span class="trending-rank">3</span><span>Laptop gaming</span><small>6.7k tìm kiếm</small></div>
                                <div class="trending-item"><span class="trending-rank">4</span><span>#dulich</span><small>5.1k bài viết</small></div>
                                <div class="trending-item"><span class="trending-rank">5</span><span>ASP.NET Core</span><small>4.3k tìm kiếm</small></div>
                            </div>
                        </div>
                    </div>
                    <div id="search-results-view" class="hidden">
                        <div id="results-title" class="results-title"></div>
                        <div id="tab-all" class="tab-content"><div id="all-results-container"></div></div>
                        <div id="tab-users" class="tab-content hidden"><div id="users-results-list" class="results-list"></div></div>
                        <div id="tab-posts" class="tab-content hidden"><div id="posts-results-list" class="results-list"></div></div>
                        <div id="tab-reels" class="tab-content hidden"><div id="reels-results-list" class="results-grid reels-grid"></div></div>
                        <div id="tab-hashtags" class="tab-content hidden"><div id="hashtags-results-list" class="results-list"></div></div>
                        <div id="tab-groups" class="tab-content hidden"><div id="groups-results-list" class="results-list"></div></div>
                        <div id="tab-products" class="tab-content hidden"><div id="products-results-list" class="results-grid products-grid"></div></div>
                        <div id="tab-shops" class="tab-content hidden"><div id="shops-results-list" class="results-list"></div></div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <script src="js/api.js"></script>
    <script src="js/lang.js"></script>
    <script src="js/i18n.js"></script>
    <script src="js/common.js?v=2.4"></script>
    <script src="js/post-actions.js"></script>
    <script src="js/search.js?v=2.0"></script>
</body>
</html>
