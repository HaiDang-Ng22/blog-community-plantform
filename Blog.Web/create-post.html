<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tạo bài viết mới - Zynk</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/auth.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="home-page">
    <header class="main-header">
        <nav class="nav-container container-wide">
            <div class="logo">
                <a href="index.html">ZYNK</a>
            </div>
            
            <div class="nav-actions" id="nav-actions">
                <!-- Sẽ được điền bằng JS -->
            </div>
        </nav>
    </header>

    <main class="main-content container-wide" style="max-width: 680px;">
        <div class="create-post-container glassmorphism" style="margin-top: 2rem;">
            <h2><i class="fa-solid fa-pen-to-square"></i> Tạo bài viết mới</h2>
            <div id="message-box" class="message-box hidden"></div>
            
            <form id="form-create-post">
                <div class="input-group">
                    <label for="post-title" style="display: block; margin-bottom: 0.5rem; font-weight: 600;">Tiêu đề</label>
                    <input type="text" id="post-title" placeholder="Nhập tiêu đề ấn tượng..." required>
                </div>

                <div class="input-group">
                    <label for="post-summary" style="display: block; margin-bottom: 0.5rem; font-weight: 600;">Tóm tắt (Ngắn gọn)</label>
                    <input type="text" id="post-summary" placeholder="Một vài dòng giới thiệu về bài viết...">
                </div>

                <div class="input-group">
                    <label style="display: block; margin-bottom: 0.5rem; font-weight: 600;">Hình ảnh bài viết (Có thể chọn nhiều)</label>
                    <div style="display: flex; gap: 1rem; align-items: center;">
                        <button type="button" class="btn secondary-btn" onclick="document.getElementById('post-image-file').click()" style="width: auto; padding: 0.6rem 1.2rem; margin: 0;">
                            <i class="fa-solid fa-images"></i> Chọn ảnh bài viết
                        </button>
                        <span id="file-name" style="font-size: 0.8rem; color: var(--text-secondary);">Chưa có ảnh nào được chọn</span>
                    </div>
                    <input type="file" id="post-image-file" accept="image/*" multiple style="display: none;" onchange="handleMultipleImageUpload(this)">
                    <div id="image-urls-container"></div> <!-- Container for multiple hidden inputs -->
                    
                    <div id="image-preview-grid" class="hidden" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 1.5rem; border: 1px dashed #dbdbdb; padding: 10px; border-radius: 8px;">
                        <!-- Previews will be injected here -->
                    </div>
                </div>

                <div class="input-group">
                    <label for="post-content" style="display: block; margin-bottom: 0.5rem; font-weight: 600;">Nội dung</label>
                    <textarea id="post-content" rows="8" placeholder="Bạn muốn chia sẻ điều gì với cộng đồng?" required style="width: 100%; padding: 1rem; border-radius: 1rem; border: 2px solid var(--input-border); font-family: inherit; resize: vertical;"></textarea>
                </div>

                <div style="display: flex; gap: 1rem; margin-top: 1rem;">
                    <button type="button" class="btn secondary-btn" onclick="window.location.href='index.html'" style="margin-top: 0; background: #E2E8F0; color: #475569;">Hủy</button>
                    <button type="submit" class="btn primary-btn" style="margin-top: 0;">Đăng bài ngay</button>
                </div>
            </form>
        </div>
    </main>

    <footer class="main-footer">
        <div class="container-wide">
            <p>&copy; 2026 Zynk Community.</p>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="js/api.js?v=1.1"></script>
    <script src="js/common.js?v=1.1"></script>
    <script src="js/create-post.js?v=1.1"></script>
</body>

</html>
