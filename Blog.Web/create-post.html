<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <link rel="icon" href="assets/favicon.png?v=2" type="image/png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="create_post_title">Tạo bài viết mới - Zynk</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/auth.css">
    <link rel="stylesheet" href="css/post-editor.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="home-page post-editor-page" data-i18n-title="create_post_title">


    <main class="main-content post-editor-shell">
        <div class="create-post-modern-modal animate-up">
            <!-- Step Header -->
            <div class="cp-modal-header">
                <button type="button" id="cp-back-btn" class="cp-header-btn hidden">
                    <i class="fa-solid fa-arrow-left"></i>
                </button>
                <h3 id="cp-modal-title" data-i18n="create_post_title">Tạo bài viết mới</h3>
                <button type="button" id="cp-next-btn" class="cp-header-btn primary hidden">Tiếp</button>
                <button type="button" id="cp-share-btn" class="cp-header-btn primary hidden">Chia sẻ</button>
            </div>

            <div class="cp-modal-body">
                <form id="form-create-post" style="display: contents;">

                    <!-- Step 0: Select Files (Initial State) -->
                    <div id="step-0" class="cp-step active"
                        style="flex:1; display:flex; align-items:center; justify-content:center; padding: 2rem;">
                        <div id="cp-dropzone" class="cp-dropzone">
                            <i class="fa-solid fa-images"
                                style="font-size: 4rem; margin-bottom: 1.25rem; color: #262626;"></i>
                            <h2 style="font-size: 1.2rem; font-weight: 500; margin-bottom: 1.2rem;">Kéo ảnh vào đây</h2>
                            
                            <div style="display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap;">
                                <button type="button" class="btn primary-btn"
                                    onclick="document.getElementById('post-image-file').click()"
                                    style="width: auto; padding: 0.6rem 1.5rem;">
                                    Tải ảnh lên
                                </button>
                                <button type="button" class="btn outline-btn"
                                    onclick="initTextOnlyPost()"
                                    style="width: auto; padding: 0.6rem 1.5rem; border: 1px solid #dbdbdb;">
                                    Chỉ văn bản
                                </button>
                                <button type="button" class="btn outline-btn"
                                    onclick="initPollPost()"
                                    style="width: auto; padding: 0.6rem 1.5rem; border: 1px solid #dbdbdb;">
                                    Thăm dò ý kiến
                                </button>
                            </div>

                            <input type="file" id="post-image-file" accept="image/*,video/*" multiple style="display: none;"
                                onchange="initWizard(this)">
                        </div>
                    </div>

                    <!-- Step 1: Crop & Reorder -->
                    <div id="step-1" class="cp-step cp-two-pane hidden">
                        <div class="cp-pane-left">
                            <div id="crop-preview-container" class="cp-preview-full">
                                <img id="current-crop-img" src="" alt="To Crop">
                            </div>
                        </div>
                        <div class="cp-pane-right cp-reorder-pane">
                            <h4 style="margin-bottom: 1rem;">Sắp xếp & Thu phóng</h4>
                            <div class="control-group" style="margin-bottom: 1.5rem;">
                                <label>Thu phóng</label>
                                <input type="range" id="adj-zoom" min="1" max="3" step="0.1" value="1"
                                    oninput="applyZoom()">
                            </div>
                            <div id="reorder-list" class="cp-thumb-list"></div>
                        </div>
                    </div>

                    <!-- Step 2: Edit / Filters -->
                    <div id="step-2" class="cp-step cp-two-pane hidden">
                        <div class="cp-pane-left">
                            <div class="cp-preview-full">
                                <img id="current-edit-img" src="" alt="To Edit">
                            </div>
                        </div>
                        <div class="cp-pane-right cp-adjust-pane">
                            <div class="cp-adjust-tabs">
                                <button type="button" id="tab-presets" class="cp-tab active" onclick="window.switchEditorTab('presets')">Bộ lọc</button>
                                <button type="button" id="tab-adjustments" class="cp-tab" onclick="window.switchEditorTab('adjustments')">Công cụ</button>
                            </div>
                            
                            <!-- Tab Presets (Instagram-style scrollable presets) -->
                            <div id="editor-presets-container" class="editor-tab-content">
                                <div class="presets-grid">
                                    <div class="preset-card active" onclick="window.applyPreset('original')">
                                        <div class="preset-preview original"></div>
                                        <span>Original</span>
                                    </div>
                                    <div class="preset-card" onclick="window.applyPreset('clarendon')">
                                        <div class="preset-preview clarendon"></div>
                                        <span>Clarendon</span>
                                    </div>
                                    <div class="preset-card" onclick="window.applyPreset('juno')">
                                        <div class="preset-preview juno"></div>
                                        <span>Juno</span>
                                    </div>
                                    <div class="preset-card" onclick="window.applyPreset('valencia')">
                                        <div class="preset-preview valencia"></div>
                                        <span>Valencia</span>
                                    </div>
                                    <div class="preset-card" onclick="window.applyPreset('monochrome')">
                                        <div class="preset-preview monochrome"></div>
                                        <span>Monochrome</span>
                                    </div>
                                    <div class="preset-card" onclick="window.applyPreset('gingham')">
                                        <div class="preset-preview gingham"></div>
                                        <span>Gingham</span>
                                    </div>
                                </div>
                            </div>
                            
                            <!-- Tab Adjustments (Manual adjustment sliders) -->
                            <div id="editor-adjustments-container" class="editor-tab-content hidden">
                                <div class="cp-adjust-controls">
                                    <div class="control-group">
                                        <div class="control-label-row">
                                            <label>Độ sáng</label>
                                            <span id="val-brightness" class="control-value-badge">100%</span>
                                        </div>
                                        <input type="range" id="adj-brightness" min="0" max="200" value="100"
                                            oninput="applyFilters()">
                                    </div>
                                    <div class="control-group">
                                        <div class="control-label-row">
                                            <label>Độ tương phản</label>
                                            <span id="val-contrast" class="control-value-badge">100%</span>
                                        </div>
                                        <input type="range" id="adj-contrast" min="0" max="200" value="100"
                                            oninput="applyFilters()">
                                    </div>
                                    <div class="control-group">
                                        <div class="control-label-row">
                                            <label>Độ bão hòa</label>
                                            <span id="val-saturate" class="control-value-badge">100%</span>
                                        </div>
                                        <input type="range" id="adj-saturate" min="0" max="200" value="100"
                                            oninput="applyFilters()">
                                    </div>
                                    <div class="control-group">
                                        <div class="control-label-row">
                                            <label>Độ mờ</label>
                                            <span id="val-blur" class="control-value-badge">0px</span>
                                        </div>
                                        <input type="range" id="adj-blur" min="0" max="10" value="0"
                                            oninput="applyFilters()">
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Step 3: Caption / Share -->
                    <div id="step-3" class="cp-step cp-two-pane hidden">
                        <div class="cp-pane-left">
                            <div class="cp-preview-full">
                                <img id="final-preview-img" src="" alt="Final Preview">
                                <video id="final-preview-video" src="" controls class="hidden" style="width: 100%; height: 100%; object-fit: cover;"></video>
                            </div>
                        </div>
                        <div class="cp-pane-right cp-caption-pane">
                            <div class="post-create-header"
                                style="display: flex; align-items: center; gap: 10px; margin-bottom: 1rem;">
                                <img id="user-avatar-mini" src="https://via.placeholder.com/32" class="mini-avatar">
                                <span id="user-name-mini" style="font-weight: 600;">User</span>
                            </div>
                            <textarea id="post-content" class="post-editor-textarea" placeholder="Viết chú thích..."
                                required></textarea>
                            
                            <div id="poll-editor" class="hidden" style="margin-top: 1rem; border: 1px solid var(--glass-border); border-radius: 12px; padding: 1rem;">
                                <h4 style="margin-bottom: 0.5rem; font-size: 0.9rem;">Thăm dò ý kiến</h4>
                                <div id="poll-options-list" style="display: flex; flex-direction: column; gap: 8px;">
                                    <input type="text" class="poll-option-input" placeholder="Lựa chọn 1">
                                    <input type="text" class="poll-option-input" placeholder="Lựa chọn 2">
                                </div>
                                <button type="button" onclick="addPollOption()" style="margin-top: 0.5rem; border: none; background: none; color: var(--primary-blue); font-size: 0.85rem; cursor: pointer; font-weight: 600;">+ Thêm lựa chọn</button>
                            </div>
                            <div class="cp-caption-meta">
                                <button type="button" class="cp-icon-btn"><i
                                        class="fa-regular fa-face-smile"></i></button>
                                <span id="char-count">0/2200</span>
                            </div>
                        </div>
                    </div>

                    <input type="hidden" id="post-title" value="Social Post">
                    <input type="hidden" id="post-summary" value="">
                </form>
            </div>
        </div>
    </main>

    <script src="js/api.js?v=2.0"></script>
    <script src="js/lang.js"></script>
    <script src="js/i18n.js"></script>
    <script src="js/common.js?v=2.5"></script>
    <script src="js/create-post.js?v=2.0"></script>
</body>

</html>
