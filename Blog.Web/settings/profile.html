<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hồ sơ cá nhân - Zynk Settings</title>
    <link rel="icon" href="../assets/favicon.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/settings-v2.css">
</head>
<body>
    <header class="main-header">
        <nav class="nav-container container-wide">
            <div class="logo">
                <a href="../index.html"><div class="zynk-logo-clean logo-header"></div></a>
            </div>
            <div class="nav-actions" id="nav-actions"></div>
        </nav>
    </header>

    <div class="settings-container">
        <!-- Sidebar dynamically rendered by settings-core.js -->
        <aside class="s-sidebar" id="s-sidebar"></aside>

        <main class="s-content">
            <div class="s-header">
                <h1 class="s-title">Hồ sơ cá nhân</h1>
                <p class="s-subtitle">Quản lý thông tin hiển thị công khai của bạn trên mạng xã hội Zynk.</p>
            </div>

            <div class="s-card">
                <h2 class="s-card-title"><i class="fa-solid fa-address-card"></i> Thông tin cơ bản</h2>
                
                <form id="profile-form">
                    <div class="s-avatar-upload">
                        <img id="avatar-preview" src="../assets/default-avatar.png" class="s-avatar-preview">
                        <div>
                            <button type="button" class="s-btn s-btn-primary" onclick="document.getElementById('avatar-file').click()">
                                <i class="fa-solid fa-camera"></i> Đổi ảnh đại diện
                            </button>
                            <p style="font-size: 0.8rem; color: var(--s-text-muted); margin-top: 8px;">Dịnh dạng JPG, PNG. Tối đa 2MB.</p>
                            <input type="file" id="avatar-file" hidden accept="image/*" onchange="handleFileSelect(this, 'avatar')">
                        </div>
                    </div>

                    <div class="s-form-group">
                        <label class="s-label">Tên người dùng (@username)</label>
                        <input type="text" id="set-username" class="s-input" placeholder="Ví dụ: haidang_nguyen">
                    </div>

                    <div class="s-form-group">
                        <label class="s-label">Họ và tên</label>
                        <input type="text" id="set-fullname" class="s-input" placeholder="Nhập họ tên đầy đủ">
                    </div>

                    <div class="s-form-group">
                        <label class="s-label">Tiểu sử (Bio)</label>
                        <textarea id="set-bio" class="s-textarea" rows="4" placeholder="Giới thiệu ngắn về bản thân..."></textarea>
                    </div>

                    <div class="s-form-group">
                        <label class="s-label">Giới tính</label>
                        <select id="set-gender" class="s-select">
                            <option value="Male">Nam</option>
                            <option value="Female">Nữ</option>
                            <option value="Other">Khác</option>
                        </select>
                    </div>

                    <div style="margin-top: 2rem; display: flex; gap: 1rem;">
                        <button type="submit" class="s-btn s-btn-primary">Lưu thay đổi</button>
                        <button type="reset" class="s-btn" style="background: var(--s-border);">Hủy</button>
                    </div>
                </form>
            </div>

            <div id="settings-msg" class="message-box hidden"></div>
        </main>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/common.js"></script>
    <script src="../js/settings-core.js"></script>
    <script>
        // Track actual uploaded avatar URL separately from preview
        let _currentAvatarUrl = '';
        let _currentCoverUrl = '';

        // Specific logic for Profile page
        async function onSettingsLoad(user) {
            document.getElementById('set-username').value = user.username || '';
            document.getElementById('set-fullname').value = user.fullName || '';
            document.getElementById('set-bio').value = user.bio || '';
            document.getElementById('set-gender').value = user.gender || 'Male';
            _currentAvatarUrl = user.avatarUrl || '';
            _currentCoverUrl = user.coverImageUrl || '';
            if (user.avatarUrl) {
                document.getElementById('avatar-preview').src = user.avatarUrl;
            }
        }

        document.getElementById('profile-form').onsubmit = async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Đang lưu...';

            const data = {
                username: document.getElementById('set-username').value,
                fullName: document.getElementById('set-fullname').value,
                bio: document.getElementById('set-bio').value,
                gender: document.getElementById('set-gender').value,
                avatarUrl: _currentAvatarUrl,
                coverImageUrl: _currentCoverUrl
            };

            try {
                const res = await window.api.put('users/profile', data);
                showSettingsStatus('Cập nhật hồ sơ thành công!');
                // Update local cache
                const userInfo = JSON.parse(localStorage.getItem('user_info') || '{}');
                localStorage.setItem('user_info', JSON.stringify({ ...userInfo, ...data }));
            } catch (err) {
                showSettingsStatus(err.message || 'Lỗi khi lưu hồ sơ', 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'Lưu thay đổi';
            }
        };

        async function handleFileSelect(input) {
            const file = input.files[0];
            if (!file) return;

            const preview = document.getElementById('avatar-preview');
            const originalSrc = preview.src;
            preview.style.opacity = '0.5';

            try {
                const result = await window.api.uploadImage(file);
                preview.src = result.url;
                _currentAvatarUrl = result.url; // Store the actual URL
                showSettingsStatus('Đã tải ảnh lên thành công!');
            } catch (err) {
                showSettingsStatus(err.message, 'error');
                preview.src = originalSrc;
            } finally {
                preview.style.opacity = '1';
            }
        }
    </script>
</body>
</html>
