<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="marketplace">Chợ Zynk - Nền tảng mua sắm cộng đồng</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="icon" href="assets/favicon.png?v=2" type="image/png">
    <link rel="stylesheet" href="css/common.css?v=1.7">
    <link rel="stylesheet" href="css/marketplace.css?v=2.3">
    <link rel="stylesheet" href="css/marketplace-premium.css?v=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="home-page" data-i18n-title="marketplace">
    <header class="main-header market-header-bar">
        <nav class="nav-container container-wide market-nav">
            <div class="logo">
                <a href="index.html">
                    <div class="zynk-logo-clean logo-header"></div>
                </a>
            </div>
            <!-- Search Bar -->
            <div class="market-search-wrap" id="market-search-wrap">
                <div class="market-search-box">
                    <i class="fa fa-search search-icon-left"></i>
                    <input type="text" id="market-search-input" class="market-search-input"
                        placeholder="Tìm kiếm sản phẩm, cửa hàng..." data-i18n="market_search_placeholder"
                        autocomplete="off">
                    <button class="search-clear-btn hidden" id="search-clear-btn" onclick="clearSearch()">
                        <i class="fa fa-times"></i>
                    </button>
                    <button class="market-search-btn" onclick="executeSearch()">
                        <i class="fa fa-search"></i> <span data-i18n="search_btn">Tìm</span>
                    </button>
                </div>
                <div class="search-suggestions" id="search-suggestions"></div>
            </div>
            <div class="nav-actions" id="nav-actions">
            </div>
        </nav>
    </header>

    <main class="container-wide" style="overflow-x:hidden; padding-bottom: 2rem;">
        <div class="marketplace-layout">
            <!-- Sidebar Removed as per request -->


                <!-- Premium Banners (Admin Managed Slider) -->
                <div class="premium-banners" id="market-banners-container">
                    <div class="banner-slider" id="banner-slider">
                        <!-- Sẽ được nạp động từ JS -->
                    </div>
                    <div class="side-banners" id="side-banners-container">
                        <!-- Sẽ được nạp động từ JS -->
                    </div>
                </div>

                <!-- Premium Categories (Integrated with Sub-categories) -->
                <div class="premium-categories-container">
                    <div class="premium-categories">
                        <h3 data-i18n="categories_title">Khám phá danh mục</h3>
                        <div class="category-circle-grid" id="category-circle-grid">
                            <!-- Injected by JS -->
                        </div>
                    </div>
                    
                    <!-- Sub-categories overlay/panel -->
                    <div id="sub-category-panel" class="sub-category-panel hidden">
                        <div class="sub-cat-header">
                            <button onclick="goBackCategory()" class="back-btn"><i class="fa fa-chevron-left"></i> Quay lại</button>
                            <h4 id="current-cat-name">Tên danh mục</h4>
                        </div>
                        <div class="sub-cat-grid" id="sub-cat-grid"></div>
                    </div>
                </div>

                <div class="market-header">
                    <h2 id="market-title" data-i18n="market_suggestions">Gợi ý hôm nay</h2>
                    <div class="market-filters">
                        <div class="price-range-filter">
                            <input type="number" id="min-price" placeholder="Tối thiểu" class="glass-input-small">
                            <span>-</span>
                            <input type="number" id="max-price" placeholder="Tối đa" class="glass-input-small">
                            <button class="btn-filter-price" onclick="applyFilters()"><i
                                    class="fa fa-filter"></i></button>
                        </div>

                        <div class="hot-tags" id="hot-tags">
                            <span class="hot-tag" onclick="searchByTag('giày')"><i class="fa fa-fire"></i> <span
                                    data-i18n="tag_shoes">Giày</span></span>
                            <span class="hot-tag" onclick="searchByTag('áo')"><i class="fa fa-fire"></i> <span
                                    data-i18n="tag_shirts">Áo</span></span>
                            <span class="hot-tag" onclick="searchByTag('túi')"><i class="fa fa-fire"></i> <span
                                    data-i18n="tag_bags">Túi xách</span></span>
                        </div>
                        <select id="sort-filter" class="glass-select" onchange="handleSort()">
                            <option value="newest" data-i18n="latest">Mới nhất</option>
                            <option value="price-asc" data-i18n="price_low_high">Giá thấp đến cao</option>
                            <option value="price-desc" data-i18n="price_high_low">Giá cao đến thấp</option>
                            <option value="rating_desc" data-i18n="top_rated">Top Đánh giá</option>
                            <option value="sales_desc" data-i18n="best_seller">Bán chạy</option>
                        </select>
                    </div>
                </div>

                <div class="product-grid" id="product-grid">
                    <div class="skeleton" style="height: 300px;"></div>
                    <div class="skeleton" style="height: 300px;"></div>
                    <div class="skeleton" style="height: 300px;"></div>
                    <div class="skeleton" style="height: 300px;"></div>
                </div>
            </div>
        </div>
    </main>

    <div class="cart-float" id="cart-float" onclick="location.href='cart.html'">
        <i class="fa-solid fa-cart-shopping"></i>
        <span class="cart-badge" id="cart-count">0</span>
    </div>

    <div id="product-modal" class="modal-overlay hidden" onclick="handleModalOverlayClick(event)">
        <div class="modal-box" id="product-modal-box">
            <div class="product-modal-body" id="product-modal-content">
            </div>
        </div>
    </div>

    <footer class="main-footer">
        <div class="container-wide">
            <p>&copy; 2026 Zynk Community. <span data-i18n="footer_desc">Nền tảng chia sẻ & mua sắm.</span></p>
        </div>
    </footer>

    <script src="js/api.js?v=1.1"></script>
    <script src="js/lang.js"></script>
    <script src="js/i18n.js"></script>
    <script src="js/common.js?v=2.5"></script>
    <script src="js/marketplace.js?v=1.4"></script>
</body>

</html>
