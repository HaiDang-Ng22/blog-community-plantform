<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="marketplace">Chợ Zynk - Nền tảng mua sắm cộng đồng</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="icon" href="assets/favicon.png?v=2" type="image/png">
    <link rel="stylesheet" href="css/common.css?v=1.5">
    <link rel="stylesheet" href="css/marketplace.css?v=2.3">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="home-page" data-i18n-title="marketplace">
    <header class="main-header market-header-bar">
        <nav class="nav-container container-wide market-nav">
            <div class="logo">
                <a href="index.html">
                    <div class="zynk-logo-clean logo-header"></div>
                </a>
            </div>
            <!-- Search Bar -->
            <div class="market-search-wrap" id="market-search-wrap">
                <div class="market-search-box">
                    <i class="fa fa-search search-icon-left"></i>
                    <input 
                        type="text" 
                        id="market-search-input" 
                        class="market-search-input" 
                        placeholder="Tìm kiếm sản phẩm, cửa hàng..."
                        data-i18n="market_search_placeholder"
                        autocomplete="off"
                    >
                    <button class="search-clear-btn hidden" id="search-clear-btn" onclick="clearSearch()">
                        <i class="fa fa-times"></i>
                    </button>
                    <button class="market-search-btn" onclick="executeSearch()">
                        <i class="fa fa-search"></i> <span data-i18n="search_btn">Tìm</span>
                    </button>
                </div>
                <!-- Search Suggestions Dropdown -->
                <div class="search-suggestions" id="search-suggestions"></div>
            </div>
            <div class="nav-actions" id="nav-actions">
                <!-- Sẽ được điền bằng common.js -->
            </div>
        </nav>
    </header>

    <main class="container-wide" style="overflow-x:hidden; padding-bottom: 2rem;">
        <div class="marketplace-layout">
            <!-- Sidebar -->
            <aside class="market-sidebar">
                <h3 data-i18n="categories_title"><i class="fa-solid fa-layer-group"></i> Danh mục</h3>
                <ul class="category-list" id="category-list">
                    <li class="category-item">
                        <a href="#" class="category-link active" data-id="all">
                            <i class="fa fa-border-all"></i> <span data-i18n="all">Tất cả</span>
                        </a>
                    </li>
                    <!-- Danh mục sẽ được load từ API -->
                </ul>
            </aside>

            <!-- Main Marketplace -->
            <div class="products-wrapper">
                <div class="market-header">
                    <h2 id="market-title">Gợi ý hôm nay</h2>
                    <div class="market-filters">
                        <!-- Hot Search Tags -->
                        <div class="hot-tags" id="hot-tags">
                            <span class="hot-tag" onclick="searchByTag('giày')"><i class="fa fa-fire"></i> Giày</span>
                            <span class="hot-tag" onclick="searchByTag('áo')"><i class="fa fa-fire"></i> Áo</span>
                            <span class="hot-tag" onclick="searchByTag('túi')"><i class="fa fa-fire"></i> Túi xách</span>
                        </div>
                        <select id="sort-filter" class="glass-select" onchange="handleSort()">
                            <option value="newest">Mới nhất</option>
                            <option value="price-asc">Giá thấp đến cao</option>
                            <option value="price-desc">Giá cao đến thấp</option>
                            <option value="popular">Bán chạy</option>
                        </select>
                    </div>
                </div>

                <div class="product-grid" id="product-grid">
                    <!-- Sản phẩm sẽ được load từ API -->
                    <div class="skeleton" style="height: 300px;"></div>
                    <div class="skeleton" style="height: 300px;"></div>
                    <div class="skeleton" style="height: 300px;"></div>
                    <div class="skeleton" style="height: 300px;"></div>
                </div>
            </div>
        </div>
    </main>

    <!-- Cart Floating Button -->
    <div class="cart-float" id="cart-float" onclick="location.href='cart.html'">
        <i class="fa-solid fa-cart-shopping"></i>
        <span class="cart-badge" id="cart-count">0</span>
    </div>

    <!-- Modal chi tiết sản phẩm -->
    <div id="product-modal" class="modal-overlay hidden" onclick="handleModalOverlayClick(event)">
        <div class="modal-box" id="product-modal-box">
            <div class="product-modal-body" id="product-modal-content">
                <!-- Nội dung inject bởi JS -->
            </div>
        </div>
    </div>

    <footer class="main-footer">
        <div class="container-wide">
            <p data-i18n="footer_copy">&copy; 2026 Zynk Community. Nền tảng chia sẻ & mua sắm.</p>
        </div>
    </footer>

    <script src="js/api.js?v=1.1"></script>
    <script src="js/lang.js"></script>
    <script src="js/i18n.js"></script>
    <script src="js/common.js?v=2.2"></script>
    <script src="js/marketplace.js?v=1.2"></script>
</body>

</html>
