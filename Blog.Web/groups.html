<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cộng đồng - Zynk</title>
    <meta name="description" content="Khám phá và tham gia các cộng đồng trên Zynk. Kết nối với những người có cùng sở thích.">
    <link rel="icon" href="assets/favicon.png?v=2" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/common.css?v=2.6">
    <link rel="stylesheet" href="css/groups.css?v=2.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="groups-page">
    <main class="main-content" id="main-content">
        <div class="groups-layout">
            <!-- Main Column -->
            <div class="groups-col">
                <!-- Page Header -->
                <div class="groups-page-header">
                    <div class="groups-page-header-text">
                        <h1><i class="fa-solid fa-people-group"></i> Cộng đồng</h1>
                        <p>Tìm kiếm và kết nối với những người có cùng đam mê</p>
                    </div>
                    <button class="btn-create-group" onclick="openCreateGroupModal()">
                        <i class="fa-solid fa-plus"></i> Tạo cộng đồng
                    </button>
                </div>

                <!-- Search Bar -->
                <div class="groups-search-bar">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" id="group-search-input" placeholder="Tìm kiếm cộng đồng..." oninput="filterGroups(this.value)">
                </div>

                <!-- Tabs -->
                <div class="groups-tabs">
                    <div class="group-tab active" data-type="my-groups">
                        <i class="fa-solid fa-users"></i> Đã tham gia
                    </div>
                    <div class="group-tab" data-type="discover">
                        <i class="fa-solid fa-compass"></i> Khám phá
                    </div>
                </div>

                <!-- Groups Grid -->
                <div id="groups-grid" class="groups-grid">
                    <div class="groups-loading">
                        <i class="fa-solid fa-spinner fa-spin fa-2x"></i>
                        <p>Đang tải danh sách nhóm...</p>
                    </div>
                </div>
            </div>

            <!-- Right Sidebar -->
            <aside class="right-sidebar">
                <!-- My Managed Groups -->
                <div class="widget groups-widget">
                    <div class="widget-header">
                        <i class="fa-solid fa-crown" style="color:#f59e0b;"></i>
                        <span class="widget-title">Cộng đồng bạn quản lý</span>
                    </div>
                    <div id="my-owned-groups-list" class="owned-groups-list">
                        <!-- populated by JS -->
                    </div>
                </div>

                <!-- Footer Links -->
                <div class="widget-footer-links">
                    <a href="about.html">Giới thiệu</a>
                    <a href="help.html">Trợ giúp</a>
                    <a href="terms.html">Điều khoản</a>
                    <span class="footer-copy">© 2026 Zynk Community.</span>
                </div>
            </aside>
        </div>
    </main>

    <!-- Create Group Modal -->
    <div id="create-group-modal" class="modal-overlay hidden">
        <div class="modal-content create-group-modal-content">
            <div class="modal-header">
                <h3><i class="fa-solid fa-people-group"></i> Tạo cộng đồng mới</h3>
                <button class="close-btn" onclick="closeCreateGroupModal()">&times;</button>
            </div>
            <div class="modal-body">
                <form id="create-group-form">
                    <!-- Avatar Upload -->
                    <div class="avatar-upload-section">
                        <div class="group-avatar-preview" id="create-avatar-preview">
                            <i class="fa-solid fa-image"></i>
                        </div>
                        <div class="avatar-upload-btns">
                            <label class="btn-upload-label" for="create-group-avatar-file">
                                <i class="fa-solid fa-camera"></i> Chọn ảnh đại diện
                            </label>
                            <input type="file" id="create-group-avatar-file" accept="image/*" style="display:none;" onchange="previewAvatar(this)">
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Tên cộng đồng <span class="required">*</span></label>
                        <input type="text" id="group-name" required placeholder="Nhập tên nhóm..." maxlength="80">
                    </div>
                    <div class="form-group">
                        <label>Mô tả ngắn <span class="required">*</span></label>
                        <textarea id="group-desc" required placeholder="Nhóm này được tạo ra để..." rows="3"></textarea>
                    </div>
                    <div class="form-group">
                        <label>Ảnh bìa (URL)</label>
                        <input type="url" id="group-cover" placeholder="https://...">
                    </div>
                    <div class="form-group">
                        <label class="privacy-toggle-label">
                            <div class="toggle-info">
                                <i class="fa-solid fa-lock"></i>
                                <div>
                                    <span>Nhóm riêng tư</span>
                                    <small>Chỉ thành viên được duyệt mới thấy bài viết</small>
                                </div>
                            </div>
                            <div class="toggle-switch">
                                <input type="checkbox" id="group-private">
                                <span class="toggle-slider"></span>
                            </div>
                        </label>
                    </div>
                    <div class="modal-actions">
                        <button type="button" class="btn-modal-cancel" onclick="closeCreateGroupModal()">Hủy</button>
                        <button type="submit" class="btn-modal-submit">
                            <i class="fa-solid fa-plus"></i> Tạo Nhóm
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="js/api.js?v=4.1"></script>
    <script src="js/common.js?v=4.1"></script>
    <script src="js/groups.js?v=2.0"></script>
</body>
</html>
