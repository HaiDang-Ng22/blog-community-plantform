<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <link rel="icon" href="assets/favicon.png?v=2" type="image/png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="seller_center">Kênh người bán - Zynk Shop</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/common.css?v=1.5">
    <link rel="stylesheet" href="css/seller.css?v=2.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="home-page" data-i18n-title="seller_center">
    <header class="main-header">
        <nav class="nav-container container-wide">
            <div class="logo">
                <a href="index.html">
                    <div class="zynk-logo-clean logo-header"></div>
                    <span style="font-size: 0.6em; background: #22c55e; color: white; padding: 2px 8px; border-radius: 6px; font-weight: 800; margin-left: 10px;">SELLER</span>
                </a>
            </div>
            <div class="nav-actions" id="nav-actions"></div>
        </nav>
    </header>

    <main class="container-wide seller-layout">
        <div class="seller-container" id="seller-content">
            <!-- Loading state -->
            <div style="text-align: center; padding: 4rem;">
                <i class="fa fa-spinner fa-spin fa-2x"></i>
                <p style="margin-top: 1rem;" data-i18n="loading">Đang kiểm tra quyền truy cập...</p>
            </div>
        </div>
    </main>

    <!-- Templates (Sẽ được inject dựa trên trạng thái người bán) -->

    <!-- 1. Template Đăng ký -->
    <template id="tpl-registration">
        <div class="seller-header">
            <h1 data-i18n="open_shop_title">Mở cửa hàng trên Zynk</h1>
            <p data-i18n="open_shop_desc">Bắt đầu sự nghiệp kinh doanh của bạn ngay hôm nay với cộng đồng Zynk.</p>
        </div>
        <form id="form-shop-apply" class="application-form">
            <div id="msg-box" class="message-box hidden"></div>
            
            <div class="input-group">
                <label data-i18n="shop_name_label">Tên cửa hàng dự kiến</label>
                <input type="text" id="shop-name" placeholder="Ví dụ: Zynk Mobile Store" data-i18n="shop_name_placeholder" required>
            </div>
            
            <h3 style="margin: 1.5rem 0 1rem 0; font-size: 1.1rem; border-bottom: 1px solid #e2e8f0; padding-bottom: 0.5rem;" data-i18n="identity_info_title">Thông tin định danh người bán</h3>
            <p style="font-size: 0.85rem; color: #64748b; margin-bottom: 1rem;" data-i18n="identity_info_desc">Vui lòng cung cấp chính xác thông tin trên CCCD/CMND của bạn. Người bán phải từ 18 tuổi trở lên.</p>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                <div class="input-group">
                    <label data-i18n="citizen_id_label">Số CCCD / CMND</label>
                    <input type="text" id="citizen-id" placeholder="Nhập số CCCD" required>
                </div>
                <div class="input-group">
                    <label data-i18n="full_name_label">Họ và tên</label>
                    <input type="text" id="full-name" placeholder="Nhập họ và tên" required>
                </div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                <div class="input-group">
                    <label data-i18n="gender_label">Giới tính</label>
                    <select id="gender" required style="width: 100%; padding: 0.75rem 1rem; border-radius: 10px; border: 1px solid #e2e8f0;">
                        <option value="Nam">Nam</option>
                        <option value="Nữ">Nữ</option>
                        <option value="Khác">Khác</option>
                    </select>
                </div>
                <div class="input-group">
                    <label data-i18n="dob_label">Ngày tháng năm sinh</label>
                    <input type="date" id="dob" required>
                </div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                <div class="input-group">
                    <label data-i18n="hometown_label">Quê quán</label>
                    <input type="text" id="hometown" placeholder="Nhập quê quán" required>
                </div>
                <div class="input-group">
                    <label data-i18n="occupation_label">Nghề nghiệp</label>
                    <input type="text" id="occupation" placeholder="Nhập nghề nghiệp" required>
                </div>
            </div>

            <div class="input-group">
                <label data-i18n="shop_desc_label">Mô tả shop</label>
                <textarea id="shop-desc" rows="4" placeholder="Giới thiệu ngắn về những gì bạn định bán..." data-i18n="shop_desc_placeholder"
                    required></textarea>
            </div>
            <button type="submit" class="btn primary-btn" id="btn-submit-apply" data-i18n="submit_apply">Gửi yêu cầu phê duyệt</button>
        </form>
    </template>

    <!-- 2. Template Đang chờ duyệt -->
    <template id="tpl-pending">
        <div class="status-card">
            <i class="fa-solid fa-clock-rotate-left"></i>
            <h2 data-i18n="pending_approval_title">Hồ sơ đang được chờ duyệt</h2>
            <p data-i18n="pending_approval_desc">Admin đang xem xét hồ sơ mở cửa hàng của bạn. Chúng tôi sẽ thông báo cho bạn ngay khi có kết quả.</p>
            <a href="index.html" class="btn secondary-btn" style="display: inline-block; margin-top: 2rem;" data-i18n="back_to_home">Quay lại
                trang chủ</a>
        </div>
    </template>

    <!-- 3. Template Dashboard -->
    <template id="tpl-dashboard">
        <div class="seller-header" style="text-align: left;">
            <h1><span data-i18n="seller_center_title">Kênh Người Bán</span>: <span id="shop-title-display">---</span></h1>
        </div>

        <div class="seller-dashboard">
            <nav class="dashboard-tabs">
                <div class="tab-link active" onclick="switchSellerTab('overview')" data-i18n="overview">Tổng quan</div>
                <div class="tab-link" onclick="switchSellerTab('products')" data-i18n="products">Sản phẩm</div>
                <div class="tab-link" onclick="switchSellerTab('orders')" data-i18n="orders">Đơn hàng</div>
                <div class="tab-link" onclick="switchSellerTab('payment')" data-i18n="payment_settings_tab">Thanh toán</div>
            </nav>

            <!-- Overview Section -->
            <section id="section-overview" class="dashboard-section active">
                <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem;">
                    <div class="glass-card" style="padding: 1.5rem; text-align: center;">
                        <h4 style="color: #64748b;" data-i18n="total_orders">Tổng đơn hàng</h4>
                        <div style="font-size: 2rem; font-weight: 800;" id="stat-orders">0</div>
                    </div>
                    <div class="glass-card" style="padding: 1.5rem; text-align: center;">
                        <h4 style="color: #64748b;" data-i18n="revenue_est">Doanh thu (Giả lập)</h4>
                        <div style="font-size: 2rem; font-weight: 800; color: #2563eb;" id="stat-revenue">0đ</div>
                    </div>
                    <div class="glass-card" style="padding: 1.5rem; text-align: center;">
                        <h4 style="color: #64748b;" data-i18n="total_products">Số lượng sản phẩm</h4>
                        <div style="font-size: 2rem; font-weight: 800;" id="stat-products">0</div>
                    </div>
                </div>
            </section>

            <!-- Products Section -->
            <section id="section-products" class="dashboard-section">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                    <h3 data-i18n="product_list">Danh sách sản phẩm</h3>
                    <button class="btn primary-btn" style="width: auto; margin: 0;" onclick="openAddProductModal()" data-i18n="add_new_product">+
                        Thêm sản phẩm mới</button>
                </div>
                <table class="data-table">
                    <thead>
                        <tr>
                            <th data-i18n="th_image">Ảnh</th>
                            <th data-i18n="th_name">Tên sản phẩm</th>
                            <th data-i18n="th_price">Giá</th>
                            <th data-i18n="th_stock">Kho</th>
                            <th data-i18n="th_status">Trạng thái</th>
                            <th data-i18n="th_actions">Thao tác</th>
                        </tr>
                    </thead>
                    <tbody id="product-list-body">
                        <!-- Data inject by JS -->
                    </tbody>
                </table>
            </section>

            <!-- Orders Section -->
            <section id="section-orders" class="dashboard-section">
                <div class="orders-header-row" style="margin-bottom: 1.5rem;">
                    <h3 data-i18n="manage_orders">Quản lý đơn hàng</h3>
                    <div style="font-size: 0.85rem; color: #64748b;" data-i18n="manage_orders_desc">
                        Quản lý và xử lý các đơn hàng của bạn
                    </div>
                </div>

                <!-- Status Filter Tabs -->
                <div class="order-tabs-wrapper">
                    <nav class="order-status-tabs" id="order-status-tabs">
                        <div class="order-tab active" data-status="All" data-i18n="status_all">Tất cả</div>
                        <div class="order-tab" data-status="Unpaid" data-i18n="status_unpaid">Chờ xác nhận</div>
                        <div class="order-tab" data-status="AwaitingShipment" data-i18n="status_awaiting">Chờ giao</div>
                        <div class="order-tab" data-status="InTransit" data-i18n="status_delivering">Đang giao</div>
                        <div class="order-tab" data-status="Delivered" data-i18n="status_delivered">Đã giao</div>
                        <div class="order-tab" data-status="Completed" data-i18n="status_completed">Hoàn thành</div>
                        <div class="order-tab" data-status="Cancelled" data-i18n="status_cancelled">Đã hủy</div>
                    </nav>
                </div>

                <!-- Search & Filters -->
                <div class="order-search-bar glassmorphism" style="margin-bottom: 2rem; padding: 1rem; border-radius: 12px; display: flex; gap: 1rem; align-items: center;">
                    <div class="search-input-group" style="flex: 1; position: relative;">
                        <i class="fa fa-search" style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: #94a3b8;"></i>
                        <input type="text" id="order-search-input" placeholder="Tìm theo Mã đơn hàng, Tên hoặc SĐT khách hàng..." data-i18n="order_search_placeholder_full"
                            style="width: 100%; padding: 0.75rem 1rem 0.75rem 2.8rem; border-radius: 10px; border: 1px solid #e2e8f0; background: #fff; font-size: 0.9rem; outline: none; transition: 0.2s;">
                    </div>
                    <button class="btn primary-btn" onclick="applyOrderFilters()" style="width: auto; margin: 0; padding: 0.75rem 1.5rem; height: 100%;" data-i18n="search">
                        Tìm kiếm
                    </button>
                </div>

                <div id="order-list-container">
                    <!-- Premium cards will be injected here by JS -->
                </div>
            </section>

            <!-- Payment Settings Section -->
            <section id="section-payment" class="dashboard-section">
                <div class="seller-header" style="text-align: left; margin-bottom: 2rem;">
                    <h3 data-i18n="payment_config_title">Cấu hình Thanh toán VietQR</h3>
                    <p style="font-size: 0.9rem; color: #64748b;">Thiết lập thông tin ngân hàng để nhận thanh toán từ khách hàng qua mã QR tự động.</p>
                </div>

                <div class="glass-card" style="max-width: 600px; padding: 2rem;">
                    <form id="form-payment-settings">
                        <div class="input-group">
                            <label data-i18n="bank_name">Ngân hàng</label>
                            <select id="bank-name" class="glass-select" style="width: 100%; height: 45px;" required>
                                <option value="" disabled selected>Chọn ngân hàng</option>
                                <option value="MB">MB Bank (Ngân hàng Quân đội)</option>
                                <option value="VCB">Vietcombank</option>
                                <option value="ICB">VietinBank</option>
                                <option value="BIDV">BIDV</option>
                                <option value="TCB">Techcombank</option>
                                <option value="ACB">ACB</option>
                                <option value="VPB">VPBank</option>
                                <option value="STB">Sacombank</option>
                                <option value="VIB">VIB</option>
                                <option value="TPB">TPBank</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label data-i18n="bank_account_number">Số tài khoản</label>
                            <input type="text" id="bank-account-number" placeholder="Nhập số tài khoản ngân hàng" required>
                        </div>
                        <div class="input-group">
                            <label data-i18n="bank_account_name">Tên chủ tài khoản (Không dấu)</label>
                            <input type="text" id="bank-account-name" placeholder="Ví dụ: NGUYEN VAN A" required>
                        </div>

                        <div style="margin-top: 2rem; background: #f0f9ff; padding: 1rem; border-radius: 12px; border: 1px solid #e0f2fe; display: flex; gap: 1rem; align-items: flex-start;">
                            <i class="fa fa-info-circle" style="color: #0ea5e9; margin-top: 3px;"></i>
                            <div style="font-size: 0.85rem; color: #0369a1; line-height: 1.5;">
                                Thông tin này sẽ được dùng để tạo mã VietQR tự động tại trang thanh toán. Đảm bảo thông tin chính xác để nhận được tiền từ khách hàng.
                            </div>
                        </div>

                        <button type="submit" class="btn primary-btn" style="margin-top: 2rem;" data-i18n="save_payment_config">Lưu cấu hình thanh toán</button>
                    </form>
                </div>
            </section>
        </div>
    </template>

    <!-- Modal Thêm sản phẩm -->
    <div id="product-add-modal" class="modal-overlay hidden">
        <div class="modal-content glassmorphism"
            style="max-width: 600px; width: 95%; max-height: 92vh; display: flex; flex-direction: column; padding: 0; overflow: hidden;">
            <!-- Sticky header -->
            <div class="modal-header"
                style="padding: 1.25rem 1.5rem; border-bottom: 1px solid var(--border-color, #e2e8f0); flex-shrink: 0; display: flex; justify-content: space-between; align-items: center;">
                <h3 style="font-size: 1.2rem; font-weight: 700;" data-i18n="add_product_title">Đăng sản phẩm mới</h3>
                <button onclick="closeAddProductModal()"
                    style="background:none; border:none; width:32px; height:32px; border-radius:8px; cursor:pointer; font-size:1.1rem; color:var(--text-secondary); display:flex; align-items:center; justify-content:center; transition:0.2s;"
                    onmouseover="this.style.background='#f1f5f9'" onmouseout="this.style.background='none'">
                    <i class="fa fa-times"></i>
                </button>
            </div>
            <!-- Scrollable body -->
            <div style="overflow-y: auto; flex: 1; padding: 1.5rem;">
                <form id="form-add-product">
                    <div class="input-group">
                        <label>Tên sản phẩm</label>
                        <input type="text" id="p-name" required>
                    </div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                        <div class="input-group">
                            <label>Giá bán (VND)</label>
                            <input type="number" id="p-price" required>
                        </div>
                        <div class="input-group">
                            <label>Số lượng kho</label>
                            <input type="number" id="p-stock" required>
                        </div>
                    </div>
                    <!-- Dynamic cascading category selector -->
                    <div class="input-group" id="category-cascade-wrapper">
                        <label>Danh mục <span style="color:#6366f1; font-size:0.8rem;">(chọn đến danh mục
                                cuối)</span></label>
                        <div id="category-cascade-selects" style="display: flex; flex-direction: column; gap: 0.5rem;">
                        </div>
                        <div id="category-selected-path"
                            style="margin-top: 0.5rem; font-size: 0.82rem; color: #6366f1; font-weight: 600; min-height: 1.2rem;">
                        </div>
                    </div>
                    <input type="hidden" id="p-category">
                    <div class="input-group">
                        <label>Mô tả sản phẩm</label>
                        <textarea id="p-desc" rows="3" required></textarea>
                    </div>
                    <div class="input-group">
                        <label>Hình ảnh sản phẩm (Link ảnh hoặc tải lên)</label>
                        <div style="display: flex; gap: 8px;">
                            <textarea id="p-images" rows="2" placeholder="https://link1.jpg, https://link2.jpg..." style="flex: 1;"></textarea>
                            <div style="display: flex; flex-direction: column; gap: 4px;">
                                <button type="button" class="btn" onclick="document.getElementById('p-upload').click()" style="width: auto; padding: 0.5rem; background: #eff6ff; color: #3b82f6; border: 1px solid #dbeafe; font-size: 0.8rem;">
                                    <i class="fa fa-upload"></i> Tải ảnh
                                </button>
                                <input type="file" id="p-upload" hidden accept="image/*" onchange="handleImageUpload(this, 'p-images')">
                            </div>
                        </div>
                    </div>

                    <div class="variant-config-box" style="margin-top: 1.5rem; padding: 1rem; background: #f8fafc; border-radius: 12px; border: 1px solid #e2e8f0;">
                        <h4 style="margin-bottom: 1rem;" data-i18n="variant_config"><i class="fa fa-list-check"></i> Cấu hình Phân loại (Tùy chọn)</h4>
                        
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem;">
                            <div class="input-group" style="margin-bottom: 0;">
                                <label>Tên nhóm 1 (VD: Màu sắc)</label>
                                <input type="text" id="p-variant-group1" placeholder="Màu sắc">
                            </div>
                            <div class="input-group" style="margin-bottom: 0;">
                                <label>Tên nhóm 2 (VD: Dung lượng)</label>
                                <input type="text" id="p-variant-group2" placeholder="Dung lượng">
                            </div>
                        </div>

                        <div id="variant-list-container" style="margin-top: 1rem;">
                            <!-- Variant rows will be added here -->
                        </div>
                        <button type="button" class="btn secondary-btn" onclick="addNewVariantRow()" style="width: auto; margin-top: 0.5rem; font-size: 0.85rem; padding: 0.4rem 1rem;" data-i18n="add_variant">
                            <i class="fa fa-plus"></i> Thêm phân loại
                        </button>
                    </div>
                </form>
            </div>
            <!-- Sticky footer with buttons -->
            <div
                style="padding: 1rem 1.5rem; border-top: 1px solid var(--border-color, #e2e8f0); flex-shrink: 0; display: flex; gap: 0.75rem; background: var(--glass-bg, white);">
                <button type="submit" form="form-add-product" class="btn primary-btn"
                    style="flex: 1; margin: 0; padding: 0.75rem;" data-i18n="save_and_show">
                    <i class="fa-solid fa-floppy-disk"></i> Lưu và Hiển thị
                </button>
                <button type="button" onclick="closeAddProductModal()" class="btn secondary-btn"
                    style="width: auto; margin: 0; padding: 0.75rem 1.25rem;" data-i18n="cancel">
                    Huỷ
                </button>
            </div>
        </div>
    </div>

    <!-- Modal Chỉnh sửa sản phẩm -->
    <div id="product-edit-modal" class="modal-overlay hidden">
        <div class="modal-content glassmorphism"
            style="max-width: 600px; width: 95%; max-height: 92vh; display: flex; flex-direction: column; padding: 0; overflow: hidden;">
            <!-- Sticky header -->
            <div class="modal-header"
                style="padding: 1.25rem 1.5rem; border-bottom: 1px solid var(--border-color, #e2e8f0); flex-shrink: 0; display: flex; justify-content: space-between; align-items: center;">
                <h3 style="font-size: 1.2rem; font-weight: 700;" data-i18n="edit_product_title"><i class="fa-solid fa-pen-to-square"
                        style="color:#6366f1; margin-right:8px;"></i>Chỉnh sửa sản phẩm</h3>
                <button onclick="closeEditProductModal()"
                    style="background:none; border:none; width:32px; height:32px; border-radius:8px; cursor:pointer; font-size:1.1rem; color:var(--text-secondary); display:flex; align-items:center; justify-content:center; transition:0.2s;"
                    onmouseover="this.style.background='#f1f5f9'" onmouseout="this.style.background='none'">
                    <i class="fa fa-times"></i>
                </button>
            </div>
            <!-- Scrollable body -->
            <div style="overflow-y: auto; flex: 1; padding: 1.5rem;">
                <form id="form-edit-product">
                    <input type="hidden" id="edit-p-id">
                    <div class="input-group">
                        <label>Tên sản phẩm</label>
                        <input type="text" id="edit-p-name" required>
                    </div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                        <div class="input-group">
                            <label>Giá bán (VND)</label>
                            <input type="number" id="edit-p-price" required>
                        </div>
                        <div class="input-group">
                            <label>Số lượng kho</label>
                            <input type="number" id="edit-p-stock" required>
                        </div>
                    </div>
                    <!-- Dynamic cascading category selector for edit -->
                    <div class="input-group" id="edit-category-cascade-wrapper">
                        <label>Danh mục <span style="color:#6366f1; font-size:0.8rem;">(chọn đến danh mục
                                cuối)</span></label>
                        <div id="edit-category-cascade-selects"
                            style="display: flex; flex-direction: column; gap: 0.5rem;"></div>
                        <div id="edit-category-selected-path"
                            style="margin-top: 0.5rem; font-size: 0.82rem; color: #6366f1; font-weight: 600; min-height: 1.2rem;">
                        </div>
                    </div>
                    <input type="hidden" id="edit-p-category">
                    <div class="input-group">
                        <label>Mô tả sản phẩm</label>
                        <textarea id="edit-p-desc" rows="3" required></textarea>
                    </div>
                    <div class="input-group">
                        <label>Hình ảnh sản phẩm (Link ảnh hoặc tải lên)</label>
                        <div style="display: flex; gap: 8px;">
                            <textarea id="edit-p-images" rows="2" placeholder="https://link1.jpg, https://link2.jpg..." style="flex: 1;"></textarea>
                            <div style="display: flex; flex-direction: column; gap: 4px;">
                                <button type="button" class="btn" onclick="document.getElementById('edit-p-upload').click()" style="width: auto; padding: 0.5rem; background: #eff6ff; color: #3b82f6; border: 1px solid #dbeafe; font-size: 0.8rem;">
                                    <i class="fa fa-upload"></i> Tải ảnh
                                </button>
                                <input type="file" id="edit-p-upload" hidden accept="image/*" onchange="handleImageUpload(this, 'edit-p-images')">
                            </div>
                        </div>
                    </div>

                    <div class="variant-config-box" style="margin-top: 1.5rem; padding: 1rem; background: #f8fafc; border-radius: 12px; border: 1px solid #e2e8f0;">
                        <h4 style="margin-bottom: 1rem;"><i class="fa fa-list-check"></i> Cấu hình Phân loại (Tùy chọn)</h4>
                        
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem;">
                            <div class="input-group" style="margin-bottom: 0;">
                                <label>Tên nhóm 1</label>
                                <input type="text" id="edit-p-variant-group1">
                            </div>
                            <div class="input-group" style="margin-bottom: 0;">
                                <label>Tên nhóm 2</label>
                                <input type="text" id="edit-p-variant-group2">
                            </div>
                        </div>

                        <div id="edit-variant-list-container" style="margin-top: 1rem;">
                            <!-- Variant rows will be added here -->
                        </div>
                        <button type="button" class="btn secondary-btn" onclick="addNewVariantRow(true)" style="width: auto; margin-top: 0.5rem; font-size: 0.85rem; padding: 0.4rem 1rem;">
                            <i class="fa fa-plus"></i> Thêm phân loại
                        </button>
                    </div>
                </form>
            </div>
            <!-- Sticky footer with buttons -->
            <div
                style="padding: 1rem 1.5rem; border-top: 1px solid var(--border-color, #e2e8f0); flex-shrink: 0; display: flex; gap: 0.75rem; background: var(--glass-bg, white);">
                <button type="submit" form="form-edit-product" class="btn primary-btn"
                    style="flex: 1; margin: 0; padding: 0.75rem;">
                    <i class="fa-solid fa-floppy-disk"></i> <span data-i18n="save_changes">Lưu thay đổi</span>
                </button>
                <button type="button" onclick="closeEditProductModal()" class="btn secondary-btn"
                    style="width: auto; margin: 0; padding: 0.75rem 1.25rem;" data-i18n="cancel">
                    Huỷ
                </button>
            </div>
        </div>
    </div>
