<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duyệt tích xanh - Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="admin-common.css">
</head>
<body>
    <main class="admin-main">
        <header class="page-header">
            <div class="page-title">
                <h1>Duyệt tích xanh (Database)</h1>
                <p>Yêu cầu từ database thật, không phải LocalStorage.</p>
            </div>
            <button class="btn btn-secondary" onclick="loadData()">
                <i class="fa-solid fa-rotate"></i> Tải lại
            </button>
        </header>

        <div class="card">
            <div class="data-table-wrap">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Người dùng</th>
                            <th>Họ tên</th>
                            <th>Loại</th>
                            <th>Ảnh</th>
                            <th>Thao tác</th>
                        </tr>
                    </thead>
                    <tbody id="v-list">
                        <tr><td colspan="5" style="text-align:center; padding:30px;">Đang tải...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="../js/api.js?v=2"></script>
    <script src="admin-common.js?v=2"></script>
    <script>
        async function loadData() {
            const list = document.getElementById('v-list');
            try {
                console.log('Đang gọi API: admin/verifications');
                const data = await window.adminApi.get('admin/verifications');
                console.log('Dữ liệu nhận được:', data);

                const pending = data.filter(x => x.status === 'Pending');
                
                if (pending.length === 0) {
                    list.innerHTML = '<tr><td colspan="5" style="text-align:center; padding:30px;">Hiện không có yêu cầu nào mới.</td></tr>';
                    return;
                }

                list.innerHTML = pending.map(req => `
                    <tr>
                        <td><b>@${req.username}</b></td>
                        <td>${req.fullName}</td>
                        <td><span class="badge badge-warning">${req.documentType}</span></td>
                        <td>
                            <button class="btn btn-secondary" onclick="window.adminModal.open('<img src=\\'${req.documentUrl}\\' style=\\'width:100%\\'>')">Xem ảnh</button>
                        </td>
                        <td>
                            <button class="btn btn-primary" onclick="action('${req.id}', 'approve')">Duyệt</button>
                            <button class="btn btn-danger" onclick="action('${req.id}', 'reject')">Từ chối</button>
                        </td>
                    </tr>
                `).join('');
            } catch (err) {
                console.error('Lỗi tải dữ liệu Admin:', err);
                list.innerHTML = `<tr><td colspan="5" style="text-align:center; color:red; padding:30px;">Lỗi: ${err.message}</td></tr>`;
            }
        }

        async function action(id, type) {
            try {
                await window.adminApi.post(`admin/verifications/${id}/${type}`, {});
                alert('Thành công!');
                loadData();
            } catch (err) {
                alert('Lỗi: ' + err.message);
            }
        }

        document.addEventListener('DOMContentLoaded', loadData);
    </script>
</body>
</html>
