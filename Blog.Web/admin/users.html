<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Người dùng - Zynk Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="admin-common.css">
</head>
<body>
    <main class="admin-main">
        <header class="page-header">
            <div class="page-title">
                <h1>Quản lý Người dùng</h1>
                <p>Xem và quản lý tài khoản người dùng trên hệ thống.</p>
            </div>
            <div style="display: flex; gap: 10px;">
                <input type="text" id="user-search" placeholder="Tìm theo tên hoặc email..." 
                       style="padding: 0.6rem 1rem; border-radius: 10px; border: 1px solid var(--admin-border); width: 250px;">
                <button class="btn btn-secondary" onclick="loadUsers()">
                    <i class="fa-solid fa-rotate"></i> Làm mới
                </button>
            </div>
        </header>

        <div class="card">
            <div class="data-table-wrap">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Người dùng</th>
                            <th>Email</th>
                            <th>Vai trò</th>
                            <th>Ngày tham gia</th>
                            <th>Thao tác</th>
                        </tr>
                    </thead>
                    <tbody id="users-list">
                        <tr>
                            <td colspan="5" style="text-align: center; padding: 2rem; color: #94a3b8;">Đang tải dữ liệu...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="../js/api.js"></script>
    <script src="admin-common.js"></script>
    <script>
        let allUsers = [];

        function resolveImageUrl(url) {
            if (!url) return 'https://via.placeholder.com/32';
            if (url.startsWith('http')) return url;
            // API_BASE_URL is something like http://localhost:7000/api
            // Avatar path is usually something like /uploads/avatar.jpg
            const baseUrl = window.API_BASE_URL.replace('/api', '');
            return baseUrl + (url.startsWith('/') ? '' : '/') + url;
        }

        async function loadUsers() {
            const list = document.getElementById('users-list');
            try {
                allUsers = await window.adminApi.get('admin/users');
                renderUsers(allUsers);
            } catch (err) {
                list.innerHTML = `<tr><td colspan="5" style="text-align: center; color: var(--admin-danger);">Lỗi: ${err.message}</td></tr>`;
            }
        }

        function renderUsers(users) {
            const list = document.getElementById('users-list');
            list.innerHTML = users.map(user => `
                <tr>
                    <td>
                        <div style="display: flex; align-items: center; gap: 10px;">
                            <img src="${resolveImageUrl(user.avatarUrl)}" 
                                 onerror="this.src='https://via.placeholder.com/32'"
                                 style="width: 32px; height: 32px; border-radius: 50%; object-fit: cover;">
                            <div style="font-weight: 600;">${user.fullName}</div>
                        </div>
                    </td>
                    <td>${user.email}</td>
                    <td><span class="badge ${user.role === 'Admin' ? 'badge-danger' : 'badge-success'}">${user.role}</span></td>
                    <td>${new Date(user.createdAt).toLocaleDateString('vi-VN')}</td>
                    <td>
                        <div style="display: flex; gap: 8px;">
                            <button class="btn btn-secondary" style="padding: 4px 8px;" onclick="viewUser('${user.id}')"><i class="fa-solid fa-eye"></i></button>
                            ${user.role !== 'Admin' ? `
                                <button class="btn btn-danger" style="padding: 4px 8px;" onclick="toggleBlock('${user.id}')" title="Xóa tài khoản">
                                    <i class="fa-solid fa-trash-can"></i>
                                </button>
                            ` : ''}
                        </div>
                    </td>
                </tr>
            `).join('');
            
            if (users.length === 0) {
                list.innerHTML = '<tr><td colspan="5" style="text-align: center; padding: 2rem; color: #94a3b8;">Không tìm thấy người dùng nào.</td></tr>';
            }
        }

        function searchUsers() {
            const query = document.getElementById('user-search').value.toLowerCase().trim();
            const filtered = allUsers.filter(u => 
                u.fullName.toLowerCase().includes(query) || 
                u.email.toLowerCase().includes(query) ||
                u.username.toLowerCase().includes(query)
            );
            renderUsers(filtered);
        }

        // Add event listener for search
        document.getElementById('user-search').addEventListener('input', searchUsers);

        async function viewUser(userId) {
            try {
                const user = await window.adminApi.get(`admin/users/${userId}`);
                window.adminModal.open(`
                    <h2 style="margin-bottom: 1.5rem;">Thông tin chi tiết</h2>
                    <div style="text-align: center; margin-bottom: 2rem;">
                        <img src="${resolveImageUrl(user.avatarUrl).replace('32', '80')}" 
                             onerror="this.src='https://via.placeholder.com/80'"
                             style="width: 80px; height: 80px; border-radius: 50%; margin-bottom: 10px; border: 4px solid var(--admin-bg); object-fit: cover;">
                        <div style="font-size: 1.25rem; font-weight: 800;">${user.fullName}</div>
                        <div style="color: var(--admin-text-muted);">@${user.username}</div>
                    </div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.5rem;">
                        <div class="card" style="padding: 1rem; text-align: center; background: #f8fafc;">
                            <div style="font-size: 0.75rem; color: #94a3b8; font-weight: 700;">BÀI VIẾT</div>
                            <div style="font-size: 1.5rem; font-weight: 800;">${user.postCount || 0}</div>
                        </div>
                        <div class="card" style="padding: 1rem; text-align: center; background: #f8fafc;">
                            <div style="font-size: 0.75rem; color: #94a3b8; font-weight: 700;">NGÀY THAM GIA</div>
                            <div style="font-size: 0.9rem; font-weight: 700; margin-top: 8px;">${new Date(user.createdAt).toLocaleDateString('vi-VN')}</div>
                        </div>
                    </div>
                    <div style="margin-bottom: 1.5rem;">
                        <div style="font-size: 0.75rem; color: #94a3b8; font-weight: 700; margin-bottom: 5px;">TIỂU SỬ</div>
                        <p style="font-size: 0.9rem; line-height: 1.6;">${user.bio || 'Chưa có tiểu sử.'}</p>
                    </div>
                    <div style="display: flex; justify-content: flex-end; gap: 10px; margin-top: 1rem;">
                        <button class="btn btn-secondary" onclick="adminModal.close()">Đóng</button>
                        ${user.role !== 'Admin' ? `<button class="btn btn-danger" onclick="toggleBlock('${user.id}')">Xóa tài khoản</button>` : ''}
                    </div>
                `);
            } catch (err) { alert('Lỗi: ' + err.message); }
        }

        async function toggleBlock(userId) {
            if (!confirm('Bạn có chắc chắn muốn xóa tài khoản này vĩnh viễn? Mọi dữ liệu sẽ bị xóa sạch.')) return;
            try {
                await window.adminApi.delete(`admin/users/${userId}`);
                alert('Đã xóa người dùng thành công.');
                loadUsers();
                adminModal.close();
            } catch (err) { alert(err.message); }
        }

        document.addEventListener('DOMContentLoaded', loadUsers);
    </script>
</body>
</html>
